services:
  # ======================
  # PostgreSQL
  # ======================
  postgres:
    image: postgres:17.2
    container_name: discodeit-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ======================
  # Redis
  # ======================
  redis:
    image: redis:7.4-alpine
    container_name: discodeit-redis
    networks:
      - backend-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ======================
  # Kafka (KRaft)
  # ======================
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: discodeit-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LOG_DIRS: /var/lib/kafka/data

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    volumes:
      - kafka-data:/var/lib/kafka/data

    networks:
      - backend-network

    restart: unless-stopped

    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092" ]
      interval: 10s
      timeout: 10s
      retries: 5

  # ======================
  # Backend 1
  # ======================
  backend-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discodeit-backend-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      INSTANCE_ID: backend-1

      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_LOCAL_ROOT_PATH: ${STORAGE_LOCAL_ROOT_PATH:-.discodeit/storage}

      JVM_OPTS: ${JVM_OPTS:--Xmx512m -Xms256m}
    volumes:
      - app-storage-1:/app/storage
    networks:
      - backend-network
    restart: unless-stopped

  # ======================
  # Backend 2
  # ======================
  backend-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discodeit-backend-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      INSTANCE_ID: backend-2

      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_LOCAL_ROOT_PATH: ${STORAGE_LOCAL_ROOT_PATH:-.discodeit/storage}

      JVM_OPTS: ${JVM_OPTS:--Xmx512m -Xms256m}
    volumes:
      - app-storage-2:/app/storage
    networks:
      - backend-network
    restart: unless-stopped

  # ======================
  # Backend 3
  # ======================
  backend-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discodeit-backend-3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      INSTANCE_ID: backend-3

      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      REDIS_HOST: redis
      REDIS_PORT: 6379

      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      STORAGE_TYPE: ${STORAGE_TYPE:-local}
      STORAGE_LOCAL_ROOT_PATH: ${STORAGE_LOCAL_ROOT_PATH:-.discodeit/storage}

      JVM_OPTS: ${JVM_OPTS:--Xmx512m -Xms256m}
    volumes:
      - app-storage-3:/app/storage
    networks:
      - backend-network
    restart: unless-stopped

  # ======================
  # Nginx (Reverse Proxy + Load Balancer)
  # ======================
  nginx:
    image: nginx:1.27-alpine
    container_name: discodeit-nginx
    depends_on:
      - backend-1
      - backend-2
      - backend-3
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/main/resources/static:/usr/share/nginx/html:ro
    ports:
      - "3000:80"
    networks:
      - backend-network
    restart: unless-stopped

# ======================
# Networks
# ======================
networks:
  backend-network:
    driver: bridge

# ======================
# Volumes
# ======================
volumes:
  postgres-data:
  kafka-data:
  app-storage-1:
  app-storage-2:
  app-storage-3: