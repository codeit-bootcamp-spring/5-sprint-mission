version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discodeit-app
    ports:
      - "8081:80"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      PROJECT_NAME: ${PROJECT_NAME}
      PROJECT_VERSION: ${PROJECT_VERSION}
      JVM_OPTS: ${JVM_OPTS}

      # DataSource (db 서비스로 연결)
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

      # Storage
      STORAGE_TYPE: ${STORAGE_TYPE}
      STORAGE_LOCAL_ROOT_PATH: ${STORAGE_LOCAL_ROOT_PATH:-/data/storage}

      # AWS (s3 사용 시)
      AWS_S3_ACCESS_KEY: ${AWS_S3_ACCESS_KEY}
      AWS_S3_SECRET_KEY: ${AWS_S3_SECRET_KEY}
      AWS_S3_REGION: ${AWS_S3_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_PRESIGNED_URL_EXPIRATION: ${AWS_S3_PRESIGNED_URL_EXPIRATION}
    volumes:
      # STORAGE_LOCAL_ROOT_PATH 비어있어도 기본값(/data/storage)로 매핑
      - discodeit_storage:${STORAGE_LOCAL_ROOT_PATH:-/data/storage}
    depends_on:
      - db

  db:
    image: postgres:17
    container_name: discodeit-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - discodeit_pgdata:/var/lib/postgresql/data
      # schema.sql은 프로젝트 구조에 맞춰 마운트
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/00_schema.sql:ro

volumes:
  discodeit_storage:
  discodeit_pgdata:
