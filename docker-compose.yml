services:
  # springboot
  app:
    build: .
    container_name: discodeit-app
    ports:
      - "8081:8080"
    env_file:
      - .env
    volumes:
      - ./binary-storage:/app/binary-storage
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    container_name: discodeit-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
    - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    - postgres-data:/var/lib/postgresql/data

  # Prometheus
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      # prometheus.yml 파일을 컨테이너 내부 경로에 연결
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  # Grafana
  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      # Grafana 데이터를 저장해서 컨테이너가 재시작돼도 대시보드가 유지되도록 설정
      - grafana-data:/var/lib/grafana

# Docker Compose가 관리할 볼륨들 정의
volumes:
  postgres-data:
  grafana-data: