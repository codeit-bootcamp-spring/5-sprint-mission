services:
  discodeit:
    #    build: .
    image: 257394472645.dkr.ecr.ap-northeast-2.amazonaws.com/discodeit-repo
    ports: [ "8080:8080" ]
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      STORAGE_TYPE: ${STORAGE_TYPE}
      AWS_S3_ACCESS_KEY: ${AWS_S3_ACCESS_KEY}
      AWS_S3_SECRET_KEY: ${AWS_S3_SECRET_KEY}
      AWS_S3_REGION: ${AWS_S3_REGION}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_S3_PREFIX: ${AWS_S3_PREFIX:-defaultPrefix}
      AWS_S3_PRESIGNED_URL_EXPIRATION: ${AWS_S3_PRESIGNED_URL_EXPIRATION:-600}
      # 로그 레벨 설정
    #      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT}
    depends_on:
      - db
    volumes:
      - discodeit-storage:/app/.discodeit



  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_PASSWORD: discodeit1234
      POSTGRES_USER: discodeit_user
      POSTGRES_DB: discodeit
    ports:
      - "5432:5432"
    volumes:
      - db:/var/lib/postgresql/data
      - ./schema:/docker-entrypoint-initdb.d


volumes:
  discodeit-storage:
  db:
