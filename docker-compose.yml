services:
  # ======================
  # PostgreSQL
  # ======================
  postgres:
    image: postgres:17.2
    env_file:
      - ./.env.properties
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - backend-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  # ======================
  # Redis
  # ======================
  redis:
    image: redis:7.4-alpine
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  # ======================
  # Kafka (KRaft)
  # ======================
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093

      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LOG_DIRS: /var/lib/kafka/data

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 10s
      timeout: 10s
      retries: 5
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  # ======================
  # Backend (single service, replicated)
  # ======================
  backend:
    image: discodeit-backend:local
    env_file:
      - ./.env.properties
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      DB_NAME: discodeit

      discodeit.storage.type: local
      discodeit.storage.local.root-path: /app/storage

      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080

      DB_HOST: postgres
      DB_PORT: 5432

      REDIS_HOST: redis
      REDIS_PORT: 6379

      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

      JVM_OPTS: ${JVM_OPTS:--Xmx512m -Xms256m}
    volumes:
      - app-storage:/app/storage
    networks:
      - backend-network
    deploy:
      replicas: 3
      restart_policy:
        condition: any

  # ======================
  # Nginx (Reverse Proxy + Load Balancer)
  # ======================
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/main/resources/static:/usr/share/nginx/html:ro
    ports:
      - "3000:80"
    networks:
      - backend-network
    deploy:
      replicas: 1
      restart_policy:
        condition: any

# ======================
# Networks (Swarm에서는 overlay)
# ======================
networks:
  backend-network:
    driver: overlay

# ======================
# Volumes
# ======================
volumes:
  postgres-data:
  kafka-data:
  app-storage:
