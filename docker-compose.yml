version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: discodeit-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discodeit-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}

      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      PROJECT_NAME: discodeit
      PROJECT_VERSION: 1.2-M8
      JVM_OPTS: ${JVM_OPTS:-}

      DISCODEIT_STORAGE_TYPE: ${DISCODEIT_STORAGE_TYPE}
      DISCODEIT_STORAGE_LOCAL_ROOT_PATH: /data

      AWS_S3_ACCESS_KEY_DEV: ${AWS_S3_ACCESS_KEY_DEV}
      AWS_S3_SECRET_KEY_DEV: ${AWS_S3_SECRET_KEY_DEV}
      AWS_S3_REGION_DEV: ${AWS_S3_REGION_DEV}
      AWS_S3_BUCKET_DEV: ${AWS_S3_BUCKET_DEV}
      AWS_S3_PRESIGNED_URL_EXPIRATION_DEV: ${AWS_S3_PRESIGNED_URL_EXPIRATION_DEV}

      AWS_S3_ACCESS_KEY_PROD: ${AWS_S3_ACCESS_KEY_PROD}
      AWS_S3_SECRET_KEY_PROD: ${AWS_S3_SECRET_KEY_PROD}
      AWS_S3_REGION_PROD: ${AWS_S3_REGION_PROD}
      AWS_S3_BUCKET_PROD: ${AWS_S3_BUCKET_PROD}
      AWS_S3_PRESIGNED_URL_EXPIRATION_PROD: ${AWS_S3_PRESIGNED_URL_EXPIRATION_PROD}

      SERVER_PORT: 80
    ports:
      - "8081:80"
    volumes:
      - app-data:/data
      - app-logs:/app/.logs

volumes:
  app-data:
  app-logs:
  pg-data:
