version: '3.8'

services:
  app:
    image: public.ecr.aws/k0e0m9w4/discodeit:latest
    container_name: discodeit-app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:80"
    env_file: .env
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/discodeit
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}
      - STORAGE_TYPE=s3
      - STORAGE_LOCAL_ROOT_PATH=.discodeit/storage
      - AWS_S3_ACCESS_KEY=${AWS_S3_ACCESS_KEY}
      - AWS_S3_SECRET_KEY=${AWS_S3_SECRET_KEY}
      - AWS_S3_REGION=${AWS_S3_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - AWS_S3_PRESIGNED_URL_EXPIRATION=600
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads-disc:/app/uploads
    networks:
      - discodeit-net

  db:
    image: postgres:17.6
    container_name: discodeit-db
    env_file: .env
    environment:
      - TZ=Asia/Seoul
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
    ports:
      - "5433:5432"
    volumes:
      - pgdata-disc:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
#      - ./src/main/resources/data.sql:/docker-entrypoint-initdb.d/02_data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-discodeit}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - discodeit-net

volumes:
  pgdata-disc:
  uploads-disc:

networks:
  discodeit-net:
    driver: bridge