spring:
  datasource:
    url: jdbc:h2:file:./data/discodeit;MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate.jdbc.time_zone: UTC

management:
  endpoint:
    health:
      show-details: when_authorized

server:
  forward-headers-strategy: native
  http2:
    enabled: true

logging:
  level:
    org.hibernate.SQL: WARN

app:
  storage:
    type: jpa
