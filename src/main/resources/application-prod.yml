spring:
  config:
    activate:
      on-profile: prod
  boot:
    admin:
      client:
        url: ${SPRING_BOOT_ADMIN_CLIENT_URL}

  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false  # 실행 쿼리 보기
    open-in-view: false # OSIV 비활성화
    hibernate:
      ddl-auto: validate  # (validate, update, create, create-drop 중 선택)
      naming: # 컬럼 명 매칭 방법
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        format_sql: false # 실행 쿼리 포맷 형식으로 보기
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: off
    org.springframework.web: info