messages_root:
  get:
    tags: [ Messages ]
    summary: Channel의 Message 목록 조회
    operationId: findAllByChannelId
    description: |
      `channelId` 조건으로 모든 메시지를 조회합니다.
    parameters:
      - in: query
        name: channelId
        schema:
          type: string
          format: uuid
        required: true
        description: 조회할 Channel ID
    responses:
      '200':
        description: Message 목록 조회 성공
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/message.yaml#/MessageResponse'
      '404':
        description: Channel을 찾을 수 없음
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml#/ApiError'
            example:
              timestamp: "2025-08-18T12:00:00Z"
              path: "/api/messages?channelId=2f9b1b3f-5b5d-4f5f-91a1-6c3c2b2a1a11"
              method: "POST"
              status: 404
              code: "RESOURCE_NOT_FOUND"
              message: "채널을(를) 찾을 수 없습니다: 2f9b1b3f-5b5d-4f5f-91a1-6c3c2b2a1a11"
  post:
    tags: [ Messages ]
    summary: Message 생성
    operationId: create
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              messageCreateRequest:
                $ref: "../schemas/message.yaml#/MessageCreateRequest"
              attachments:
                type: array
                description: Message 첨부 파일들
                items:
                  type: string
                  format: binary
            required: [ messageCreateRequest ]
          encoding:
            messageCreateRequest:
              contentType: application/json
    responses:
      '201':
        description: Message가 성공적으로 생성됨
        content:
          application/json:
            schema:
              $ref: '../schemas/message.yaml#/MessageCreateResponse'
            example:
              id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
              createdAt: "2025-08-17T15:30:02Z"
              updatedAt: "2025-08-17T15:30:02Z"
              content: "Hello, world!"
              channelId: "b9a9a9c2-3d3b-4f0a-b5a1-1f2a4c6b7d8e"
              authorId: "c2a9a9c2-3erb-4f0a-b5a1-1f2af36b7d2r"
              attachmentIds:
                - "s019f93r-3d4b-4f0a-b5a1-1f2a4c6b7d8q"
      '400':
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml#/ApiError'
            examples:
              invalidField:
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/messages"
                  method: "POST"
                  status: 400
                  code: "INVALID_BODY_VALUE"
                  message: "입력 값이 유효하지 않습니다."
                  details:
                    - "content: 크기가 0에서 2000 사이여야 합니다"
              invalidJSON:
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/messages"
                  method: "POST"
                  status: 400
                  code: "INVALID_JSON"
                  message: "요청 본문을 읽을 수 없습니다. JSON 형식과 필드 타입을 확인하세요"
                  details:
                    - "Unexpected character ('}' (code 125)): was expecting double-quote to start field name\n at [Source: REDACTED (`StreamReadFeature.INCLUDE_SOURCE_IN_LOCATION` disabled); line: 5, column: 1]"
      '404':
        description: Channel 또는 User를 찾을 수 없음
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml#/ApiError'
            example:
              timestamp: "2025-08-17T15:30:02Z"
              path: "/api/messages"
              method: "POST"
              status: 404
              code: "RESOURCE_NOT_FOUND"
              message: "Channel | Author with id {channelId | authorId} not found"
      '415':
        $ref: '../responses/errors.yaml#/UnsupportedMediaType'
