messages_root:
  get:
    tags: [ Messages ]
    summary: Channel의 Message 목록 조회
    operationId: findAllByChannelId
    description: |
      `channelId` 조건으로 모든 메시지를 조회합니다.
    parameters:
      - in: query
        name: channelId
        schema:
          type: string
          format: uuid
        required: true
        description: 조회할 Channel ID
    responses:
      '200':
        description: Message 목록 조회 성공
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/message.yaml#/MessageResponse'
      '404':
        description: Channel을 찾을 수 없음
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml#/ApiError'
            example:
              timestamp: "2025-08-18T12:00:00Z"
              path: "/api/messages?channelId=2f9b1b3f-5b5d-4f5f-91a1-6c3c2b2a1a11"
              method: "POST"
              status: 404
              code: "NOT_FOUND"
              message: "채널을(를) 찾을 수 없습니다: 2f9b1b3f-5b5d-4f5f-91a1-6c3c2b2a1a11"
  post:
    tags: [ Messages ]
    summary: Message 생성
    operationId: create
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              messageCreateRequest:
                $ref: "../schemas/message.yaml#/MessageCreateRequest"
              attachments:
                type: array
                description: Message 첨부 파일들
                items:
                  type: string
                  format: binary
            required: [ messageCreateRequest ]
          encoding:
            messageCreateRequest:
              contentType: application/json
    responses:
      '201':
        description: Message가 성공적으로 생성됨
        content:
          application/json:
            schema:
              $ref: '../schemas/message.yaml#/MessageCreateResponse'
            example:
              id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
              createdAt: "2025-08-17T15:30:02Z"
              updatedAt: "2025-08-17T15:30:02Z"
              content: "Hello, world!"
              channelId: "b9a9a9c2-3d3b-4f0a-b5a1-1f2a4c6b7d8e"
              authorId: "c2a9a9c2-3erb-4f0a-b5a1-1f2af36b7d2r"
              attachmentIds:
                - "s019f93r-3d4b-4f0a-b5a1-1f2a4c6b7d8q"
      '400':
        description: Bad Request
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml#/ApiError'
            examples:
              invalidField:
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/users"
                  method: "POST"
                  status: 400
                  code: "VALIDATION_ERROR"
                  message: "입력 값이 유효하지 않습니다."
                  details:
                    - "content: 크기가 2000 이하여야 합니다."
              invalidJSON:
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/users"
                  method: "POST"
                  status: 400
                  code: "VALIDATION_ERROR"
                  message: "요청 본문을 읽을 수 없습니다. JSON 형식과 필드 타입을 확인하세요."
                  details:
                    - "Unexpected character ('}' (code 125)): was expecting double-quote to start field name\n at [Source: REDACTED (`StreamReadFeature.INCLUDE_SOURCE_IN_LOCATION` disabled); line: 5, column: 1]"
      '404':
        description: Channel 또는 User를 찾을 수 없음
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml#/ApiError'
            example:
              timestamp: "2025-08-17T15:30:02Z"
              path: "/api/messages"
              method: "POST"
              status: 404
              code: "NOT_FOUND"
              message: "Channel | Author with id {channelId | authorId} not found"
      '415':
        $ref: '../responses/errors.yaml#/UnsupportedMediaType'
message:
  get:
    tags: [ Users ]
    summary: 사용자 단건 조회
    description: ID(UUID)로 사용자를 조회합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
        description: 사용자 UUID
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/UserResponse'
      '404':
        $ref: '../responses/errors.yaml#/NotFound'

  delete:
    tags: [ Users ]
    summary: 사용자 삭제 (소프트 삭제)
    description: |
      사용자 계정을 소프트 삭제합니다.<br>
      또한 사용자가 **owner**인 길드를 소프트 삭제하고,<br>
      해당 사용자가 보낸/받은 **친구 요청**도 함께 소프트 삭제합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
        description: 사용자 UUID
    responses:
      '204':
        description: No Content
      '404': { $ref: '../responses/errors.yaml#/NotFound' }

user_profile_settings:
  patch:
    tags: [ Users ]
    summary: 프로필 설정 변경
    description: globalName, bio를 수정합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdateProfileSettingsRequest'
          example:
            globalName: Alice
            bio: Hello, world!
    responses:
      '204': { description: No Content }
      '400': { $ref: '../responses/errors.yaml#/BadRequest' }
      '404': { $ref: '../responses/errors.yaml#/NotFound' }

user_profile_image:
  put:
    tags: [ Users ]
    summary: 프로필 이미지 변경
    description: Binary Content로 업로드한 profileId를 업데이트합니다.<br>기존 이미지가 있다면 서버 정책에 따라 정리됩니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdateProfileImageRequest'
          example:
            profileId: "b9a9a9c2-3d3b-4f0a-b5a1-1f2a4c6b7d8e"
    responses:
      '204': { description: No Content }
      '400': { $ref: '../responses/errors.yaml#/BadRequest' }
      '404': { $ref: '../responses/errors.yaml#/NotFound' }

  delete:
    tags: [ Users ]
    summary: 프로필 이미지 제거
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204': { description: No Content }
      '400': { $ref: '../responses/errors.yaml#/BadRequest' }
      '404': { $ref: '../responses/errors.yaml#/NotFound' }

user_email:
  put:
    tags: [ Users ]
    summary: 이메일 변경
    description: 이메일을 변경합니다. 중복 시 409를 반환합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdateEmailRequest'
          example:
            email: "alice.new@example.com"
    responses:
      '204': { description: No Content }
      '400': { $ref: '../responses/errors.yaml#/BadRequest' }
      '404': { $ref: '../responses/errors.yaml#/NotFound' }
      '409': { $ref: '../responses/errors.yaml#/Conflict' }

user_username:
  put:
    tags: [ Users ]
    summary: 사용자명 변경
    description: 사용자명을 변경합니다. 중복 시 409를 반환합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdateUsernameRequest'
          example:
            username: "alice.k"
    responses:
      '204': { description: No Content }
      '400': { $ref: '../responses/errors.yaml#/BadRequest' }
      '404': { $ref: '../responses/errors.yaml#/NotFound' }
      '409': { $ref: '../responses/errors.yaml#/Conflict' }

user_password:
  put:
    tags: [ Users ]
    summary: 비밀번호 변경
    description: 동일한 비밀번호로 변경 시 409를 반환합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdatePasswordRequest'
          example:
            password: "N3wP@ssw0rd!"
    responses:
      '204': { description: No Content }
      '400': { $ref: '../responses/errors.yaml#/BadRequest' }
      '404': { $ref: '../responses/errors.yaml#/NotFound' }
      '409': { $ref: '../responses/errors.yaml#/Conflict' }

user_phone_number:
  put:
    tags: [ Users ]
    summary: 전화번호 등록/변경
    description: E.164 형식(`+`로 시작, 숫자 8~15자리)만 허용합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdatePhoneNumberRequest'
          examples:
            e164:
              summary: E.164 예시
              value: { phoneNumber: "+821012345678" }
    responses:
      '204': { description: No Content }
      '400': { $ref: '../responses/errors.yaml#/BadRequest' }
      '404': { $ref: '../responses/errors.yaml#/NotFound' }

  delete:
    tags: [ Users ]
    summary: 전화번호 제거
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204': { description: No Content }
      '404': { $ref: '../responses/errors.yaml#/NotFound' }

user_deactivation:
  post:
    tags: [ Users ]
    summary: 계정 비활성화
    description: 계정을 비활성화합니다. (소프트 삭제와는 다름)
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: No Content
      '404':
        $ref: '../responses/errors.yaml#/NotFound'
