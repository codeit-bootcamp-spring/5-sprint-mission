readStatusesRoot:
  get:
    tags:
      - ReadStatus
    summary: User의 Message 읽음 상태 목록 조회
    operationId: findAllByUserId
    parameters:
      - $ref: "../openapi-users.yaml#/components/parameters/UserIdInQuery"
    responses:
      '200':
        description: Message 읽음 상태 목록 조회 성공
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/readStatus.yaml#/ReadStatusDto"
      '400':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              invalidParameterType:
                description: parameter(userId) 타입이 UUID가 아님
                value:
                  timestamp: "2025-08-21T14:42:21.048570Z"
                  path: "/api/readStatuses?userId=not-uuid"
                  method: "GET"
                  status: 400
                  code: "INVALID_PARAMETER_TYPE"
                  message: "Request parameter type not valid"
                  details:
                    - "parameter=userId, value=not-uuid, expectedType=UUID"
              missingParameter:
                description: 요청에 parameter(userId)가 포함되지 않음
                value:
                  timestamp: "2025-08-22T14:00:41.625908Z"
                  path: "/api/readStatuses"
                  method: "GET"
                  status: 400
                  code: "MISSING_PARAMETER"
                  message: "Required parameter missing"
                  details:
                    - "missing parameter: userId (required type: UUID)"
      '404':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              userNotFound:
                description: User를 찾을 수 없음
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/read-statuses"
                  method: "GET"
                  status: 404
                  code: "RESOURCE_NOT_FOUND"
                  message: "User with id e6681542-a6b1-43f3-b759-6dc9cfebcf41 not found"
  post:
    tags:
      - ReadStatus
    summary: Message 읽음 상태 생성
    operationId: create
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/readStatus.yaml#/ReadStatusCreateRequest"
    responses:
      '201':
        description: Message 읽음 상태가 성공적으로 생성됨
        content:
          'application/json':
            schema:
              $ref: "../schemas/readStatus.yaml#/ReadStatusDto"
            example:
              id: "2f9b1b3f-5b5d-4f5f-91a1-6c3c2b2a1a11"
              userId: "2f9b1b3f-5b5d-4f5f-91a1-6c3c2b2a1a11"
              channelId: "6c1c5c7a-6d7d-4e9d-8a1f-bb2b3c4d5e6f"
              lastReadAt: "2025-08-17T15:30:00Z"
      '400':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              invalidJson:
                description: JSON parsing 실패
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/readStatuses"
                  method: "POST"
                  status: 400
                  code: "INVALID_JSON"
                  message: "Unable to read request body, please check JSON format and field type"
                  details:
                    - "Unexpected character ('}' (code 125)): was expecting double-quote to start field name\n at [Source: REDACTED (`StreamReadFeature.INCLUDE_SOURCE_IN_LOCATION` disabled); line: 7, column: 1]"
      '404':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              userNotFound:
                description: User를 찾을 수 없음
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/read-statuses"
                  method: "POST"
                  status: 404
                  code: "RESOURCE_NOT_FOUND"
                  message: "User with id e6681542-a6b1-43f3-b759-6dc9cfebcf41 not found"
              channelNotFound:
                description: Channel을 찾을 수 없음
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/read-statuses"
                  method: "POST"
                  status: 404
                  code: "RESOURCE_NOT_FOUND"
                  message: "Channel with id e6681542-a6b1-43f3-b759-6dc9cfebcf41 not found"
      '409':
        description: 이미 읽음 상태가 존재함
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            example:
              timestamp: "2025-08-17T15:30:02Z"
              path: "/api/read-statuses"
              method: "POST"
              status: 409
              code: "CONFLICT"
              message: "ReadStatus with userId e6681542-a6b1-43f3-b759-6dc9cfebcf41 and channelId 4fcd07c1-a995-4111-809a-b726915a5aee already exists"
readStatusById:
  patch:
    tags:
      - ReadStatus
    summary: Message 읽음 상태 수정
    operationId: update
    parameters:
      - $ref: "../openapi-readStatuses.yaml#/components/parameters/ReadStatusIdInPath"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/readStatus.yaml#/ReadStatusUpdateRequest"
    responses:
      '200':
        description: Message 읽음 상태가 성공적으로 수정됨
        content:
          application/json:
            schema:
              $ref: "../schemas/readStatus.yaml#/ReadStatusDto"
      '400':
        content:
          application/json:
            examples:
              invalidParameterType:
                description: parameter(userId) 타입이 UUID가 아님
                value:
                  timestamp: "2025-08-21T14:42:21.048570Z"
                  path: "/api/readStatuses/not-uuid"
                  method: "GET"
                  status: 400
                  code: "INVALID_PARAMETER_TYPE"
                  message: "Request parameter type not valid"
                  details:
                    - "parameter=userId, value=not-uuid, expectedType=UUID"
      '404':
        content:
          application/json:
            examples:
              readStatusNotFound:
                description: Message 읽음 상태를 찾을 수 없음
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/readStatuses/e6681542-a6b1-43f3-b759-6dc9cfebcf41"
                  method: "GET"
                  status: 404
                  code: "RESOURCE_NOT_FOUND"
                  message: "ReadStatus with id e6681542-a6b1-43f3-b759-6dc9cfebcf41 not found"