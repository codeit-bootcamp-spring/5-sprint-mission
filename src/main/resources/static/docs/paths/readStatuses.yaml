readStatusesRoot:
  get:
    tags:
      - ReadStatus
    summary: User의 Message 읽음 상태 목록 조회
    operationId: findAllByUserId
    parameters:
      - name: userId
        in: query
        description: 조회할 User ID
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Message 읽음 상태 목록 조회 성공
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/readStatus.yaml#/ReadStatusResponse"
      '404':
        description: User를 찾을 수 없음
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            example:
              timestamp: "2025-08-18T12:00:00Z"
              path: "/api/read-statuses?userId=2f9b1b3f-5b5d-4f5f-91a1-6c3c2b2a1a11"
              method: "GET"
              status: 404
              code: "RESOURCE_NOT_FOUND"
              message: "User with id 2f9b1b3f-5b5d-4f5f-91a1-6c3c2b2a1a11 not found"
  post:
    tags:
      - ReadStatuses
    summary: Message 읽음 상태 생성
    operationId: create
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/readStatus.yaml#/ReadStatusCreateRequest"
          example:
            userId: 2f9b1b3f-5b5d-4f5f-91a1-6c3c2b2a1a11
            channelId: 6c1c5c7a-6d7d-4e9d-8a1f-bb2b3c4d5e6f
            lastReadAt: "2025-08-17T15:30:00Z"
    responses:
      '201':
        description: Message 읽음 상태가 성공적으로 생성됨
        content:
          'application/json':
            schema:
              $ref: "../schemas/readStatus.yaml#/ReadStatusResponse"
            example:
              id: "2f9b1b3f-5b5d-4f5f-91a1-6c3c2b2a1a11"
              createdAt: "2025-08-17T15:30:00Z"
              updatedAt: "2025-08-17T15:30:00Z"
              userId: "2f9b1b3f-5b5d-4f5f-91a1-6c3c2b2a1a11"
              channelId: "6c1c5c7a-6d7d-4e9d-8a1f-bb2b3c4d5e6f"
              lastReadAt: "2025-08-17T15:30:00Z"
      '404':
        description: Channel 또는 User를 찾을 수 없음
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            example:
              timestamp: "2025-08-18T12:00:00Z"
              path: "/api/read-statuses"
              method: "POST"
              status: 404
              code: "RESOURCE_NOT_FOUND"
              message: "리소스를 찾을 수 없습니다: {UUID}"
      '409':
        description: 이미 읽음 상태가 존재함
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            example:
              timestamp: "2025-08-17T15:30:02Z"
              path: "/api/read-statuses"
              method: "POST"
              status: 409
              code: "CONFLICT"
              message: "ReadStatus with userId {userId} and channelId {channelId} already exists"

