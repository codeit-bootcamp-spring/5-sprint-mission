user_password:
  put:
    tags: [ Users ]
    summary: 비밀번호 변경
    description: 동일한 비밀번호로 변경 시 409를 반환합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdatePasswordRequest'
          example:
            password: "N3wP@ssw0rd!"
    responses:
      '204': { description: No Content }
      '400': { $ref: '../response/error.yaml#/BadRequest' }
      '404': { $ref: '../response/error.yaml#/NotFound' }
      '409': { $ref: '../response/error.yaml#/Conflict' }
      '500': { $ref: '../response/error.yaml#/InternalError' }

user_phone_number:
  put:
    tags: [ Users ]
    summary: 전화번호 등록/변경
    description: E.164 형식(`+`로 시작, 숫자 8~15자리)만 허용합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdatePhoneNumberRequest'
          examples:
            e164:
              summary: E.164 예시
              value: { phoneNumber: "+821012345678" }
    responses:
      '204': { description: No Content }
      '400': { $ref: '../response/error.yaml#/BadRequest' }
      '404': { $ref: '../response/error.yaml#/NotFound' }
      '500': { $ref: '../response/error.yaml#/InternalError' }

  delete:
    tags: [ Users ]
    summary: 전화번호 제거
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204': { description: No Content }
      '400': { $ref: '../response/error.yaml#/BadRequest' }
      '404': { $ref: '../response/error.yaml#/NotFound' }
      '500': { $ref: '../response/error.yaml#/InternalError' }

user_status:
