users_root:
  get:
    tags:
      - User
    summary: 전체 User 목록 조회
    operationId: findAll
    description: |
      모든 사용자를 조회하거나 `username` 또는 `email` 조건으로 검색합니다.<br>
      `username`과 `email`을 동시에 전달하면 400을 반환합니다.<br>
      조회된 사용자가 1명이어도 array로 반환합니다.
    parameters:
      - in: query
        name: username
        schema:
          type: string
          minLength: 2
          maxLength: 32
          pattern: "^(?!.*\\.\\.)[A-Za-z0-9._]+$"
        required: false
        description: username으로 사용자 검색 (서버에서 strip+lowercase 정규화)
      - in: query
        name: email
        schema:
          type: string
          format: email
          minLength: 6
          maxLength: 254
        required: false
        description: email로 사용자 검색 (서버에서 strip+lowercase 정규화)
    responses:
      '200':
        description: User 목록 조회 성공
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/user.yaml#/UserResponse'
            example:
              [
                {
                  "id": "983ef160-4389-4d80-aadc-13a772525173",
                  "createdAt": "2025-08-18T09:00:09.791282Z",
                  "updatedAt": "2025-08-18T09:00:09.791282Z",
                  "username": "woody",
                  "email": "woody@codeit.com",
                  "profileId": null,
                  "online": true
                },
                {
                  "id": "d6831c9f-d9c3-45d8-bfd3-6c5b0976077e",
                  "createdAt": "2025-08-18T09:06:45.271391Z",
                  "updatedAt": "2025-08-18T09:06:45.271391Z",
                  "username": "buzz",
                  "email": "buzz@codeit.com",
                  "profileId": "4454f06b-2dc9-4473-92ac-f16532cab09e",
                  "online": false
                }
              ]
      '400':
        description: User 목록 조회 실패
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml#/ApiError'
            example:
              timestamp: "2025-08-17T15:30:02Z"
              path: "/api/users"
              method: "GET"
              status: 400
              code: "BAD_REQUEST"
              message: "요청이 올바르지 않습니다."
              details:
                - "username과 email은 동시에 포함될 수 없습니다."
                - "username은 2자 이상이어야 합니다."
                - "email은 6자 이상이어야 합니다."
  post:
    tags:
      - User
    summary: User 등록
    operationId: create
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              userCreateRequest:
                $ref: "../schemas/user.yaml#/UserCreateRequest"
              profile:
                type: string
                format: binary
                description: User 프로필 이미지
            required:
              - userCreateRequest
          encoding:
            userCreateRequest:
              contentType: application/json
    responses:
      '201':
        description: User가 성공적으로 생성됨
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/UserCreateResponse'
            example:
              {
                "id": "e6681542-a6b1-43f3-b759-6dc9cfebcf41",
                "createdAt": "2025-08-18T14:26:12.176736Z",
                "updatedAt": "2025-08-18T14:26:12.176736Z",
                "username": "test",
                "email": "test@codeit.com",
                "password": "$2a$10$dWaZkA5OoFmhdht9dizPvOGRoHd1vWjwib/U7ooQ.tLMdG3zSEORK",
                "profileId": "d6703e18-89e6-4722-bfc1-cc253bb7046f"
              }
      '400':
        description: Field validation/JSON parsing 오류
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml#/ApiError'
            examples:
              invalidField:
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/users"
                  method: "POST"
                  status: 400
                  code: "VALIDATION_ERROR"
                  message: "입력 값이 유효하지 않습니다."
                  details:
                    - "email: 올바른 형식의 이메일 주소여야 합니다"
                    - "email: 크기가 6에서 254 사이여야 합니다"
                    - "username: 크기가 2에서 32 사이여야 합니다"
                    - "username: 공백일 수 없습니다"
                    - "username: \"^(?!.*\\.\\.)[A-Za-z0-9._]+$\"와 일치해야 합니다"
                    - "password: 크기가 8에서 72 사이여야 합니다"
              invalidJSON:
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/users"
                  method: "POST"
                  status: 400
                  code: "VALIDATION_ERROR"
                  message: "요청 본문을 읽을 수 없습니다. JSON 형식과 필드 타입을 확인하세요."
                  details:
                    - "Unexpected character ('}' (code 125)): was expecting double-quote to start field name\n at [Source: REDACTED (`StreamReadFeature.INCLUDE_SOURCE_IN_LOCATION` disabled); line: 5, column: 1]"
      '409':
        description: 같은 email 또는 username를 사용하는 User가 이미 존재함
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              duplicateEmail:
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/users"
                  method: "POST"
                  status: 409
                  code: "CONFLICT"
                  message: "User with email {email} already exists"
              duplicateUsername:
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/users"
                  method: "POST"
                  status: 409
                  code: "CONFLICT"
                  message: "User with username {username} already exists"
      '415':
        description: userCreateRequest가 application/json 형식이 아니거나, 이미지 파일의 타입이 지원되지 않음
        content:
          application/json:
            schema:
              $ref: '../responses/errors.yaml#/UnsupportedMediaType'
            examples:
              invalidUserCreateRequest:
                value:
                  timestamp: "2025-08-19T07:13:02.116388Z"
                  path: "/api/users"
                  method: "POST"
                  status: 415
                  code: "UNSUPPORTED_MEDIA_TYPE"
                  message: "허용되지 않은 미디어 타입입니다. 지원되는 타입: application/json, application/yaml, application/*+json"
                  details:
                    - "Content-Type 'application/octet-stream' is not supported"
              invalidProfile:
                value:
                  timestamp: "2025-08-19T07:13:02.116388Z"
                  path: "/api/users"
                  method: "POST"
                  status: 415
                  code: "UNSUPPORTED_MEDIA_TYPE"
                  message: "허용되지 않은 미디어 타입입니다. 지원되는 타입: application/octet-stream, image/png, image/jpeg, image/webp"
                  details:
                    - "Content-Type 'image/vnd.microsoft.icon' is not supported"
user:
  get:
    tags: [ Users ]
    summary: 사용자 단건 조회
    description: ID(UUID)로 사용자를 조회합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
        description: 사용자 UUID
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/UserResponse'
      '404':
        $ref: '../responses/errors.yaml#/NotFound'

  delete:
    tags: [ Users ]
    summary: 사용자 삭제 (소프트 삭제)
    description: |
      사용자 계정을 소프트 삭제합니다.<br>
      또한 사용자가 **owner**인 길드를 소프트 삭제하고,<br>
      해당 사용자가 보낸/받은 **친구 요청**도 함께 소프트 삭제합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
        description: 사용자 UUID
    responses:
      '204':
        description: No Content
      '404': { $ref: '../responses/errors.yaml#/NotFound' }

user_profile_settings:
  patch:
    tags: [ Users ]
    summary: 프로필 설정 변경
    description: globalName, bio를 수정합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdateProfileSettingsRequest'
          example:
            globalName: Alice
            bio: Hello, world!
    responses:
      '204': { description: No Content }
      '400': { $ref: '../responses/errors.yaml#/BadRequest' }
      '404': { $ref: '../responses/errors.yaml#/NotFound' }

user_profile_image:
  put:
    tags: [ Users ]
    summary: 프로필 이미지 변경
    description: Binary Content로 업로드한 profileId를 업데이트합니다.<br>기존 이미지가 있다면 서버 정책에 따라 정리됩니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdateProfileImageRequest'
          example:
            profileId: "b9a9a9c2-3d3b-4f0a-b5a1-1f2a4c6b7d8e"
    responses:
      '204': { description: No Content }
      '400': { $ref: '../responses/errors.yaml#/BadRequest' }
      '404': { $ref: '../responses/errors.yaml#/NotFound' }

  delete:
    tags: [ Users ]
    summary: 프로필 이미지 제거
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204': { description: No Content }
      '400': { $ref: '../responses/errors.yaml#/BadRequest' }
      '404': { $ref: '../responses/errors.yaml#/NotFound' }

user_email:
  put:
    tags: [ Users ]
    summary: 이메일 변경
    description: 이메일을 변경합니다. 중복 시 409를 반환합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdateEmailRequest'
          example:
            email: "alice.new@example.com"
    responses:
      '204': { description: No Content }
      '400': { $ref: '../responses/errors.yaml#/BadRequest' }
      '404': { $ref: '../responses/errors.yaml#/NotFound' }
      '409': { $ref: '../responses/errors.yaml#/Conflict' }

user_username:
  put:
    tags: [ Users ]
    summary: 사용자명 변경
    description: 사용자명을 변경합니다. 중복 시 409를 반환합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdateUsernameRequest'
          example:
            username: "alice.k"
    responses:
      '204': { description: No Content }
      '400': { $ref: '../responses/errors.yaml#/BadRequest' }
      '404': { $ref: '../responses/errors.yaml#/NotFound' }
      '409': { $ref: '../responses/errors.yaml#/Conflict' }

user_password:
  put:
    tags: [ Users ]
    summary: 비밀번호 변경
    description: 동일한 비밀번호로 변경 시 409를 반환합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdatePasswordRequest'
          example:
            password: "N3wP@ssw0rd!"
    responses:
      '204': { description: No Content }
      '400': { $ref: '../responses/errors.yaml#/BadRequest' }
      '404': { $ref: '../responses/errors.yaml#/NotFound' }
      '409': { $ref: '../responses/errors.yaml#/Conflict' }

user_phone_number:
  put:
    tags: [ Users ]
    summary: 전화번호 등록/변경
    description: E.164 형식(`+`로 시작, 숫자 8~15자리)만 허용합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdatePhoneNumberRequest'
          examples:
            e164:
              summary: E.164 예시
              value: { phoneNumber: "+821012345678" }
    responses:
      '204': { description: No Content }
      '400': { $ref: '../responses/errors.yaml#/BadRequest' }
      '404': { $ref: '../responses/errors.yaml#/NotFound' }

  delete:
    tags: [ Users ]
    summary: 전화번호 제거
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204': { description: No Content }
      '404': { $ref: '../responses/errors.yaml#/NotFound' }

user_deactivation:
  post:
    tags: [ Users ]
    summary: 계정 비활성화
    description: 계정을 비활성화합니다. (소프트 삭제와는 다름)
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '204':
        description: No Content
      '404':
        $ref: '../responses/errors.yaml#/NotFound'
