usersRoot:
  get:
    tags:
      - User
    summary: 전체 User 목록 조회
    operationId: findAll
    description: |-
      모든 사용자를 조회하거나 **username** 또는 **email** 조건으로 검색합니다.
      - **username**과 **email**은 동시에 전달할 수 없습니다. 동시에 전달되면 400(BAD_REQUEST)을 반환합니다.
      - 결과는 항상 배열로 반환됩니다(0개/1개여도 배열).
    parameters:
      - $ref: "../openapi-users.yaml#/components/parameters/Username"
      - $ref: "../openapi-users.yaml#/components/parameters/Email"
    responses:
      '200':
        description: User 목록 조회 성공
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/user.yaml#/UserResponse"
            example:
              - id: "2589ffe4-1f98-4f64-82cf-d1857e7f42f8"
                createdAt: "2025-08-23T08:44:21.766937Z"
                updatedAt: "2025-08-23T08:44:21.766937Z"
                username: "jessie"
                email: "jessie@codeit.com"
                profileId: null
                online: true
              - id: "6d33007b-1a77-4c70-b295-7feaccf8aaf8"
                createdAt: "2025-08-23T08:44:13.691575Z"
                updatedAt: "2025-08-23T08:44:13.691575Z"
                username: "rex"
                email: "rex@codeit.com"
                profileId: "a0777d4a-15c8-4477-b1ad-0fb16276882b"
                online: false
              - id: "da717ad7-efe6-48eb-94cd-4f7265ead16c"
                createdAt: "2025-08-23T08:44:06.738403Z"
                updatedAt: "2025-08-23T08:44:06.738403Z"
                username: "buzz"
                email: "buzz@codeit.com"
                profileId: "4fcd07c1-a995-4111-809a-b726915a5aee"
                online: true
              - id: "d0e0dfdd-cdbc-41cd-970f-b8ce5776111a"
                createdAt: "2025-08-23T08:43:46.881887Z"
                updatedAt: "2025-08-23T08:43:46.881887Z"
                username: "woody"
                email: "woody@codeit.com"
                profileId: null
                online: false
      '400':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              invalidParameterNumber:
                description: username, email을 동시에 포함
                value:
                  timestamp: "2025-08-23T08:47:53.015980Z"
                  path: "/api/users"
                  method: "GET"
                  status: 400
                  code: "INVALID_PARAMETER_NUMBER"
                  message: "Multiple parameters not allowed"
                  details:
                    - "username, email: 하나만 포함하여야 합니다"
              invalidParameterValue:
                description: 매개변수 값이 유효하지 않음
                value:
                  timestamp: "2025-08-23T08:53:50.548938Z"
                  path: "/api/users"
                  method: "GET"
                  status: 400
                  code: "INVALID_PARAMETER_VALUE"
                  message: "Request parameter value not valid"
                  details:
                    - "username: 크기가 2에서 32 사이여야 합니다"
                    - "email: 올바른 형식의 이메일 주소여야 합니다"
                    - "email: 크기가 6에서 254 사이여야 합니다"
  post:
    tags:
      - User
    summary: User 등록
    operationId: create
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              userCreateRequest:
                $ref: "../schemas/user.yaml#/UserCreateRequest"
              profile:
                type: string
                format: binary
                description: User 프로필 이미지
            required:
              - userCreateRequest
          encoding:
            userCreateRequest:
              contentType: application/json
    responses:
      '201':
        description: User가 성공적으로 생성됨
        content:
          application/json:
            schema:
              $ref: "../schemas/user.yaml#/UserSaveResponse"
            example:
              id: "e9ea0824-fc8f-45a8-acfa-db97424f71d4"
              createdAt: "2025-08-23T08:55:27.157270Z"
              updatedAt: "2025-08-23T08:55:27.157270Z"
              username: "test"
              email: "test@codeit.com"
              password: "$2a$10$NQzvbzT8uZa9BrU6xj8iBulqOLSjh2TadE6.PoOkKQ1A4AIwbBudW"
              profileId: "a68a5f8e-784d-4b47-b0af-8243ee79c166"
      '400':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              invalidField:
                description: userCreateRequest Field 값이 유효하지 않음
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/users"
                  method: "POST"
                  status: 400
                  code: "INVALID_BODY_VALUE"
                  message: "Request body value not valid"
                  details:
                    - "username: 크기가 2에서 32 사이여야 합니다"
                    - "username: 공백일 수 없습니다"
                    - "email: 올바른 형식의 이메일 주소여야 합니다"
                    - "email: 크기가 6에서 254 사이여야 합니다"
                    - "email: 공백일 수 없습니다"
                    - "password: 크기가 8에서 72 사이여야 합니다"
                    - "password: 공백일 수 없습니다"
              invalidJson:
                description: JSON parsing 실패
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/users"
                  method: "POST"
                  status: 400
                  code: "INVALID_JSON"
                  message: "Unable to read request body, please check JSON format and field type"
                  details:
                    - "Unexpected character ('}' (code 125)): was expecting double-quote to start field name\n at [Source: REDACTED (`StreamReadFeature.INCLUDE_SOURCE_IN_LOCATION` disabled); line: 7, column: 1]"
              missingUserCreateRequest:
                description: 요청에 userCreateRequest가 포함되지 않음
                value:
                  timestamp: "2025-08-21T14:48:06.656981Z"
                  path: "/api/users"
                  method: "POST"
                  status: 400
                  code: "MISSING_PART"
                  message: "Required part missing"
                  details:
                    - "missing part: userCreateRequest"
      '409':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              duplicateUsername:
                description: 같은 username을 사용하는 User가 이미 존재함
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/users"
                  method: "POST"
                  status: 409
                  code: "CONFLICT"
                  message: "User with username test already exists"
              duplicateEmail:
                description: 같은 email을 사용하는 User가 이미 존재함
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/users"
                  method: "POST"
                  status: 409
                  code: "CONFLICT"
                  message: "User with email test@codeit.com already exists"
      '415':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              invalidUserCreateRequest:
                description: userCreateRequest가 application/json 형식이 아님
                value:
                  timestamp: "2025-08-19T07:13:02.116388Z"
                  path: "/api/users"
                  method: "POST"
                  status: 415
                  code: "UNSUPPORTED_MEDIA_TYPE"
                  message: "Media type not allowed. Supported types: application/json, application/yaml, application/*+json"
                  details:
                    - "Content-Type 'application/octet-stream' not supported"
              invalidProfile:
                description: 프로필 이미지의 타입이 지원되지 않음
                value:
                  timestamp: "2025-08-19T07:13:02.116388Z"
                  path: "/api/users"
                  method: "POST"
                  status: 415
                  code: "UNSUPPORTED_MEDIA_TYPE"
                  message: "Media type not allowed. Supported types: application/octet-stream, image/png, image/jpeg, image/webp"
                  details:
                    - "Content-Type 'image/vnd.microsoft.icon' not supported"
userById:
