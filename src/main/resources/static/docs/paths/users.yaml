userStatus:
  patch:
    tags:
      - User
    summary: User 온라인 상태 업데이트
    description: |-
      - **ONLINE**, **DO_NOT_DISTURB**, **IDLE**, **OFFLINE** 중 하나로 상태를 변경합니다.
      - 또는 **lastActiveAt**을 업데이트 합니다.
      - 로그아웃 상태면 항상 **online**은 false, **userStatusType**은 OFFLINE으로 반환됩니다.
      - **ONLINE**으로 업데이트 시 UTC 기준 **lastActiveAt**과 현재 시간이 5분 이상 차이날 경우, **UserStatusType**은 **IDLE**로 반한됩니다.
    operationId: updateUserStatusByUserId
    parameters:
      - $ref: "../openapi-users.yaml#/components/parameters/UserIdInPath"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/user.yaml#/UserStatusUpdateRequest"
    responses:
      '200':
        description: User 온라인 상태가 성공적으로 업데이트됨
        content:
          application/json:
            schema:
              $ref: "../schemas/user.yaml#/UserStatusResponse"
            example:
              id: "28807592-fc25-4d9c-a281-dc014b50deb8"
              createdAt: "2025-08-22T05:29:52.441558Z"
              updatedAt: "2025-08-22T05:34:45.029098Z"
              userId: "dff68265-b7be-4976-9832-46110cdf3aa4"
              lastActiveAt: "2025-08-22T05:35:45.486300Z"
              online: true
              userStatusType: "ONLINE"
      '400':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              invalidJson:
                description: JSON parsing 실패
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/users/983ef160-4389-4d80-aadc-13a772525173/userStatus"
                  method: "PATCH"
                  status: 400
                  code: "INVALID_JSON"
                  message: "Unable to read request body, please check JSON format and field type"
                  details:
                    - "Text '2025-08-22T09:31' could not be parsed at index 16"
              invalidParameterType:
                description: parameter(userId) 타입이 UUID가 아님
                value:
                  timestamp: "2025-08-21T14:42:21.048570Z"
                  path: "/api/users/not-uuid/userStatus"
                  method: "PATCH"
                  status: 400
                  code: "INVALID_PARAMETER_TYPE"
                  message: "Request parameter type not valid"
                  details:
                    - "parameter=userId, value=not-uuid, expectedType=UUID"
      '404':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              userNotFound:
                description: User를 찾을 수 없음
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/users/e6681542-a6b1-43f3-b759-6dc9cfebcf41/userStatus"
                  method: "POST"
                  status: 404
                  code: "RESOURCE_NOT_FOUND"
                  message: "User with id e6681542-a6b1-43f3-b759-6dc9cfebcf41 not found"

heartbeat:
  post:
    tags:
      - User
    summary: 사용자 상태의 **lastActiveAt** 갱신
    description: |-
      - 하트비트를 실행하여 사용자의 **lastActiveAt**을 현재 시간으로 변경합니다.
    operationId: heartbeat
    parameters:
      - $ref: "../openapi-users.yaml#/components/parameters/UserIdInPath"
    responses:
      '204':
        description: 성공적으로 하트비트됨
      '400':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              invalidParameterType:
                description: parameter(userId) 타입이 UUID가 아님
                value:
                  timestamp: "2025-08-21T14:42:21.048570Z"
                  path: "/api/users/not-uuid/heartbeat"
                  method: "POST"
                  status: 400
                  code: "INVALID_PARAMETER_TYPE"
                  message: "Request parameter type not valid"
                  details:
                    - "parameter=userId, value=not-uuid, expectedType=UUID"
      '404':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              userNotFound:
                description: User를 찾을 수 없음
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/users/e6681542-a6b1-43f3-b759-6dc9cfebcf41/heartbeat"
                  method: "POST"
                  status: 404
                  code: "RESOURCE_NOT_FOUND"
                  message: "User with id e6681542-a6b1-43f3-b759-6dc9cfebcf41 not found"
