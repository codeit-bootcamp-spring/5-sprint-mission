usersRoot:
  get:
    tags:
      - User
    summary: 전체 User 목록 조회
    operationId: findAll
    description: |-
      모든 사용자를 조회하거나 **username** 또는 **email** 조건으로 검색합니다.
      
      - **username**과 **email**은 동시에 전달할 수 없습니다. 동시에 전달되면 400(BAD_REQUEST)을 반환합니다.
      - 입력 값은 서버에서 strip 후 소문자로 정규화됩니다.
      - 결과는 항상 배열로 반환됩니다(0개/1개여도 배열).
    parameters:
      - $ref: '../openapi-users.yaml#/components/parameters/Username'
      - $ref: '../openapi-users.yaml#/components/parameters/Email'
    responses:
      '200':
        description: User 목록 조회 성공
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/user.yaml#/UserResponse'
            example:
              - id: "983ef160-4389-4d80-aadc-13a772525173"
                createdAt: "2025-08-18T09:00:09.791282Z"
                updatedAt: "2025-08-18T09:00:09.791282Z"
                username: "woody"
                email: "woody@codeit.com"
                profileId: null
                online: true
              - id: "d6831c9f-d9c3-45d8-bfd3-6c5b0976077e"
                createdAt: "2025-08-18T09:06:45.271391Z"
                updatedAt: "2025-08-18T09:06:45.271391Z"
                username: "buzz"
                email: "buzz@codeit.com"
                profileId: "4454f06b-2dc9-4473-92ac-f16532cab09e"
                online: false
      '400':
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml#/ApiError'
            examples:
              invalidParameterNumber:
                description: username, email을 동시에 포함
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/users"
                  method: "GET"
                  status: 400
                  code: "INVALID_PARAMETER_NUMBER"
                  message: "Multiple parameters not allowed"
                  details:
                    - "username, email: 하나만 포함하여야 합니다"
              invalidParameterValues:
                description: 매개변수 값이 유효하지 않음
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/users"
                  method: "GET"
                  status: 400
                  code: "INVALID_PARAMETER_VALUES"
                  message: "매개변수 값이 유효하지 않습니다."
                  details:
                    - "username: 크기가 2에서 32 사이여야 합니다"
                    - "username: \"^(?!.*\\.\\.)[A-Za-z0-9._]+$\"와 일치해야 합니다"
                    - "email: 올바른 형식의 이메일 주소여야 합니다"
                    - "email: 크기가 6에서 254 사이여야 합니다"
  post:
    tags:
      - User
    summary: User 등록
    operationId: create
    requestBody:
      required: true
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              userCreateRequest:
                $ref: "../schemas/user.yaml#/UserCreateRequest"
              profile:
                type: string
                format: binary
                description: User 프로필 이미지
            required:
              - userCreateRequest
          encoding:
            userCreateRequest:
              contentType: application/json
    responses:
      '201':
        description: User가 성공적으로 생성됨
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/UserSaveResponse'
            example:
              id: "e6681542-a6b1-43f3-b759-6dc9cfebcf41"
              createdAt: "2025-08-18T14:26:12.176736Z"
              updatedAt: "2025-08-18T14:26:12.176736Z"
              username: "test"
              email: "test@codeit.com"
              password: "$2a$10$dWaZkA5OoFmhdht9dizPvOGRoHd1vWjwib/U7ooQ.tLMdG3zSEORK"
              profileId: "d6703e18-89e6-4722-bfc1-cc253bb7046f"
      '400':
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml#/ApiError'
            examples:
              invalidField:
                description: userCreateRequest Field 값이 유효하지 않음
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/users"
                  method: "POST"
                  status: 400
                  code: "INVALID_BODY_VALUE"
                  message: "Request body value not valid"
                  details:
                    - "username: 크기가 2에서 32 사이여야 합니다"
                    - "username: 공백일 수 없습니다"
                    - "username: \"^(?!.*\\.\\.)[A-Za-z0-9._]+$\"와 일치해야 합니다"
                    - "email: 올바른 형식의 이메일 주소여야 합니다"
                    - "email: 크기가 6에서 254 사이여야 합니다"
                    - "email: 공백일 수 없습니다"
                    - "password: 크기가 8에서 72 사이여야 합니다"
                    - "password: 공백일 수 없습니다"
              invalidJson:
                description: JSON parsing 실패
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/users"
                  method: "POST"
                  status: 400
                  code: "INVALID_JSON"
                  message: "Unable to read request body, please check JSON format and field type"
                  details:
                    - "Unexpected character ('}' (code 125)): was expecting double-quote to start field name\n at [Source: REDACTED (`StreamReadFeature.INCLUDE_SOURCE_IN_LOCATION` disabled); line: 7, column: 1]"
              missingUserCreateRequest:
                description: userCreateRequest 없음
                value:
                  timestamp: "2025-08-21T14:48:06.656981Z"
                  path: "/api/users"
                  method: "POST"
                  status: 400
                  code: "MISSING_PART"
                  message: "Required part missing"
                  details:
                    - "missing part: userCreateRequest"
      '409':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              duplicateUsername:
                description: 같은 username을 사용하는 User가 이미 존재함
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/users"
                  method: "POST"
                  status: 409
                  code: "CONFLICT"
                  message: "User with username test already exists"
              duplicateEmail:
                description: 같은 email을 사용하는 User가 이미 존재함
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/users"
                  method: "POST"
                  status: 409
                  code: "CONFLICT"
                  message: "User with email test@codeit.com already exists"
      '415':
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml#/ApiError'
            examples:
              invalidUserCreateRequest:
                description: userCreateRequest가 application/json 형식이 아님
                value:
                  timestamp: "2025-08-19T07:13:02.116388Z"
                  path: "/api/users"
                  method: "POST"
                  status: 415
                  code: "UNSUPPORTED_MEDIA_TYPE"
                  message: "Media type not allowed. Supported types: application/json, application/yaml, application/*+json"
                  details:
                    - "Content-Type 'application/octet-stream' not supported"
              invalidProfile:
                description: 프로필 이미지의 타입이 지원되지 않음
                value:
                  timestamp: "2025-08-19T07:13:02.116388Z"
                  path: "/api/users"
                  method: "POST"
                  status: 415
                  code: "UNSUPPORTED_MEDIA_TYPE"
                  message: "Media type not allowed. Supported types: application/octet-stream, image/png, image/jpeg, image/webp"
                  details:
                    - "Content-Type 'image/vnd.microsoft.icon' not supported"
userById:
  delete:
    tags:
      - User
    summary: User 삭제
    operationId: delete
    parameters:
      - $ref: '../openapi-users.yaml#/components/parameters/UserId'
    responses:
      '204':
        description: User가 성공적으로 삭제됨
      '400':
        description: parameter(userId) 타입이 UUID가 아님
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml#/ApiError'
            example:
              timestamp: "2025-08-21T14:42:21.048570Z"
              path: "/api/users/not-uuid"
              method: "DELETE"
              status: 400
              code: "INVALID_PARAMETER_TYPE"
              message: "Request parameter type not valid"
              details:
                - "parameter=userId, value=not-uuid, expectedType=UUID"
      '404':
        description: User를 찾을 수 없음
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml#/ApiError'
            example:
              timestamp: "2025-08-17T15:30:02Z"
              path: "/api/users/983ef160-4389-4d80-aadc-13a772525173"
              method: "DELETE"
              status: 404
              code: "RESOURCE_NOT_FOUND"
              message: "User with id 983ef160-4389-4d80-aadc-13a772525173 not found"
  patch:
    tags:
      - User
    summary: User 정보 수정
    operationId: update
    parameters:
      - $ref: '../openapi-users.yaml#/components/parameters/UserId'
    requestBody:
      content:
        multipart/form-data:
          schema:
            type: object
            properties:
              userUpdateRequest:
                $ref: "../schemas/user.yaml#/UserUpdateRequest"
              profile:
                type: string
                format: binary
                description: 수정할 User 프로필 이미지
          encoding:
            userUpdateRequest:
              contentType: application/json
    responses:
      '200':
        description: User 정보가 성공적으로 수정됨
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/UserSaveResponse'
            example:
              id: "e6681542-a6b1-43f3-b759-6dc9cfebcf41"
              createdAt: "2025-08-18T14:26:12.176736Z"
              updatedAt: "2025-08-18T14:26:12.176736Z"
              username: "test"
              email: "test@codeit.com"
              password: "$2a$10$dWaZkA5OoFmhdht9dizPvOGRoHd1vWjwib/U7ooQ.tLMdG3zSEORK"
              profileId: "d6703e18-89e6-4722-bfc1-cc253bb7046f"
      '400':
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml#/ApiError'
            examples:
              invalidField:
                description: userUpdateRequest Field 값이 유효하지 않음
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/users/983ef160-4389-4d80-aadc-13a772525173"
                  method: "PATCH"
                  status: 400
                  code: "INVALID_BODY_VALUE"
                  message: "Request body value not valid"
                  details:
                    - "newUsername: 크기가 2에서 32 사이여야 합니다"
                    - "newUsername: \"^(?!.*\\.\\.)[A-Za-z0-9._]+$\"와 일치해야 합니다"
                    - "newEmail: 올바른 형식의 이메일 주소여야 합니다"
                    - "newEmail: 크기가 6에서 254 사이여야 합니다"
                    - "newPassword: 크기가 8에서 72 사이여야 합니다"
              invalidJson:
                description: JSON parsing 실패
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/users/983ef160-4389-4d80-aadc-13a772525173"
                  method: "PATCH"
                  status: 400
                  code: "INVALID_JSON"
                  message: "Unable to read request body, please check JSON format and field type"
                  details:
                    - "Unexpected character ('}' (code 125)): was expecting double-quote to start field name\n at [Source: REDACTED (`StreamReadFeature.INCLUDE_SOURCE_IN_LOCATION` disabled); line: 7, column: 1]"
              invalidParameterType:
                description: parameter(userId) 타입이 UUID가 아님
                value:
                  timestamp: "2025-08-21T14:42:21.048570Z"
                  path: "/api/users/not-uuid"
                  method: "PATCH"
                  status: 400
                  code: "INVALID_PARAMETER_TYPE"
                  message: "Request parameter type not valid"
                  details:
                    - "parameter=userId, value=not-uuid, expectedType=UUID"
      '409':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              duplicateUsername:
                description: username를 사용하는 User가 이미 존재함
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/users/983ef160-4389-4d80-aadc-13a772525173"
                  method: "PATCH"
                  status: 409
                  code: "CONFLICT"
                  message: "User with username {username} already exists"
              duplicateEmail:
                description: 같은 email을 사용하는 User가 이미 존재함
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/users/983ef160-4389-4d80-aadc-13a772525173"
                  method: "PATCH"
                  status: 409
                  code: "CONFLICT"
                  message: "User with email {email} already exists"
      '415':
        content:
          application/json:
            schema:
              $ref: '../schemas/error.yaml#/ApiError'
            examples:
              invalidUserUpdateRequest:
                description: userUpdateRequest가 application/json 형식이 아님
                value:
                  timestamp: "2025-08-19T07:13:02.116388Z"
                  path: "/api/users/983ef160-4389-4d80-aadc-13a772525173"
                  method: "PATCH"
                  status: 415
                  code: "UNSUPPORTED_MEDIA_TYPE"
                  message: "Media type not allowed. Supported types: application/json, application/yaml, application/*+json"
                  details:
                    - "Content-Type 'application/octet-stream' not supported"
              invalidProfile:
                description: 이미지 파일의 타입이 지원되지 않음
                value:
                  timestamp: "2025-08-19T07:13:02.116388Z"
                  path: "/api/users/983ef160-4389-4d80-aadc-13a772525173"
                  method: "PATCH"
                  status: 415
                  code: "UNSUPPORTED_MEDIA_TYPE"
                  message: "Media type not allowed. Supported types: application/octet-stream, image/png, image/jpeg, image/webp"
                  details:
                    - "Content-Type 'image/vnd.microsoft.icon' not supported"
