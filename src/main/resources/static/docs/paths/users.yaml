users:
  post:
    tags: [ Users ]
    summary: 사용자 등록
    description: 새 사용자를 등록합니다. 성공 시 201과 함께 생성된 사용자 정보를 반환합니다. 이 엔드포인트는 인증이 필요하지 않습니다.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserRegisterRequest'
          example:
            email: alice@example.com
            globalName: Alice Kim
            username: alice.k
            password: P@ssw0rd123
            birthDate: '2001-05-10'
            subscribedToNewsletter: true
    responses:
      '201':
        description: Created
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/UserRegisterResponse'
      '400': { $ref: '../response/error.yaml#/BadRequest' }
      '404': { $ref: '../response/error.yaml#/NotFound' }
      '409': { $ref: '../response/error.yaml#/Conflict' }
      '500': { $ref: '../response/error.yaml#/InternalError' }

  get:
    tags: [ Users ]
    summary: 사용자 목록/검색
    description: |
      모든 사용자를 조회하거나 `username` 또는 `email` 조건으로 검색합니다.
      `username`과 `email`을 동시에 전달하면 400을 반환합니다.
    parameters:
      - in: query
        name: username
        schema:
          type: string
          minLength: 2
          maxLength: 32
          pattern: "^(?!.*\\.\\.)[A-Za-z0-9._]+$"
        required: false
        description: username으로 사용자 검색 (서버에서 strip+lowercase 정규화)
      - in: query
        name: email
        schema:
          type: string
          format: email
          minLength: 6
          maxLength: 254
        required: false
        description: email로 사용자 검색 (서버에서 strip+lowercase 정규화)
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/user.yaml#/UserResponse'
      '400': { $ref: '../response/error.yaml#/BadRequest' }
      '500': { $ref: '../response/error.yaml#/InternalError' }

user:
  get:
    tags: [ Users ]
    summary: 사용자 단건 조회
    description: ID(UUID)로 사용자를 조회합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
        description: 사용자 UUID
    responses:
      '200':
        description: OK
        content:
          application/json:
            schema:
              $ref: '../schemas/user.yaml#/UserResponse'
      '400': { $ref: '../response/error.yaml#/BadRequest' }
      '404': { $ref: '../response/error.yaml#/NotFound' }
      '500': { $ref: '../response/error.yaml#/InternalError' }

  delete:
    tags: [ Users ]
    summary: 사용자 삭제 (소프트 삭제)
    description: |
      사용자 계정을 소프트 삭제합니다.
      또한 사용자가 **owner**인 길드를 소프트 삭제하고,
      해당 사용자가 보낸/받은 **친구 요청**도 함께 소프트 삭제합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
        description: 사용자 UUID
    responses:
      '204':
        description: No Content
      '400': { $ref: '../response/error.yaml#/BadRequest' }
      '404': { $ref: '../response/error.yaml#/NotFound' }
      '409': { $ref: '../response/error.yaml#/Conflict' }
      '500': { $ref: '../response/error.yaml#/InternalError' }

user_profile_settings:
  patch:
    tags: [ Users ]
    summary: 프로필 설정 변경
    description: globalName, bio를 수정합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdateProfileSettingsRequest'
          example:
            globalName: Alice
            bio: Hello, world!
    responses:
      '204': { description: No Content }
      '400': { $ref: '../response/error.yaml#/BadRequest' }
      '404': { $ref: '../response/error.yaml#/NotFound' }
      '500': { $ref: '../response/error.yaml#/InternalError' }

user_profile_image:
  put:
    tags: [ Users ]
    summary: 프로필 이미지 변경
    description: profileId를 업데이트합니다. 기존 이미지가 있다면 서버 정책에 따라 정리됩니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdateProfileImageRequest'
          example:
            profileId: "b9a9a9c2-3d3b-4f0a-b5a1-1f2a4c6b7d8e"
    responses:
      '204': { description: No Content }
      '400': { $ref: '../response/error.yaml#/BadRequest' }
      '404': { $ref: '../response/error.yaml#/NotFound' }
      '500': { $ref: '../response/error.yaml#/InternalError' }

  delete:
    tags: [ Users ]
    summary: 프로필 이미지 제거
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204': { description: No Content }
      '400': { $ref: '../response/error.yaml#/BadRequest' }
      '404': { $ref: '../response/error.yaml#/NotFound' }
      '500': { $ref: '../response/error.yaml#/InternalError' }

user_email:
  put:
    tags: [ Users ]
    summary: 이메일 변경
    description: 이메일을 변경합니다. 중복 시 409를 반환합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdateEmailRequest'
          example:
            email: "alice.new@example.com"
    responses:
      '204': { description: No Content }
      '400': { $ref: '../response/error.yaml#/BadRequest' }
      '404': { $ref: '../response/error.yaml#/NotFound' }
      '409': { $ref: '../response/error.yaml#/Conflict' }
      '500': { $ref: '../response/error.yaml#/InternalError' }

user_username:
  put:
    tags: [ Users ]
    summary: 사용자명 변경
    description: 사용자명을 변경합니다. 중복 시 409를 반환합니다.
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/user.yaml#/UserUpdateUsernameRequest'
          example:
            username: "alice.k"
    responses:
      '204': { description: No Content }
      '400': { $ref: '../response/error.yaml#/BadRequest' }
      '404': { $ref: '../response/error.yaml#/NotFound' }
      '409': { $ref: '../response/error.yaml#/Conflict' }
