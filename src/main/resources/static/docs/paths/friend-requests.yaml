friend_requests_clear_by_user:
  delete:
    tags: [ FriendRequests ]
    summary: 특정 사용자의 친구 요청 전체 삭제(soft delete)
    operationId: clearFriendRequestsByUser
    parameters:
      - in: path
        name: userId
        required: true
        schema: { type: string, format: uuid }
    responses:
      '204':
