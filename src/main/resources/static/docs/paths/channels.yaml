channelsRoot:
  get:
    tags:
      - Channel
    summary: User가 참여 중인 Channel 목록 조회
    operationId: findAll
    parameters:
      - $ref: "../openapi-users.yaml#/components/parameters/UserIdInQuery"
    responses:
      '200':
        description: Channel 목록 조회 성공
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "../schemas/channel.yaml#/ChannelResponse"
            example:
              - id: "5b98cf49-38ba-48ab-a4fc-0c335dee6e2c"
                type: "PRIVATE"
                name: null
                description: null
                participantIds:
                  - "f77609a6-ad81-425a-85a9-0e7f04dcb769"
                  - "f7243a72-3831-4a0d-896e-b889ee4693de"
                  - "983ef160-4389-4d80-aadc-13a772525173"
                  - "d6831c9f-d9c3-45d8-bfd3-6c5b0976077e"
                lastMessageAt: null
              - id: "24bd1fed-d151-497d-a1fb-07233cd6381d"
                type: "PRIVATE"
                name: null
                description: null
                participantIds:
                  - "f77609a6-ad81-425a-85a9-0e7f04dcb769"
                  - "f7243a72-3831-4a0d-896e-b889ee4693de"
                lastMessageAt: "2025-08-22T05:34:45Z"
      '400':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              invalidParameterType:
                description: parameter(userId) 타입이 UUID가 아님
                value:
                  timestamp: "2025-08-21T14:42:21.048570Z"
                  path: "/api/channels?userId=not-uuid"
                  method: "GET"
                  status: 400
                  code: "INVALID_PARAMETER_TYPE"
                  message: "Request parameter type not valid"
                  details:
                    - "parameter=userId, value=not-uuid, expectedType=UUID"
              missingParameter:
                description: 요청에 parameter(userId)가 포함되지 않음
                value:
                  timestamp: "2025-08-22T14:00:41.625908Z"
                  path: "/api/channels"
                  method: "GET"
                  status: 400
                  code: "MISSING_PARAMETER"
                  message: "Required parameter missing"
                  details:
                    - "missing parameter: userId (required type: UUID)"
      '404':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              userNotFound:
                description: User를 찾을 수 없음
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/channels?userId=e6681542-a6b1-43f3-b759-6dc9cfebcf41"
                  method: "GET"
                  status: 404
                  code: "RESOURCE_NOT_FOUND"
                  message: "User with id e6681542-a6b1-43f3-b759-6dc9cfebcf41 not found"
publicChannels:
  post:
    tags:
      - Channel
    summary: Public Channel 생성
    operationId: createPublic
    description: 공개 채널을 생성합니다.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/channel.yaml#/PublicChannelCreateRequest"
    responses:
      '201':
        description: Public Channel이 성공적으로 생성됨
        content:
          application/json:
            schema:
              $ref: "../schemas/channel.yaml#/ChannelSaveResponse"
      '400':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              invalidField:
                description: Body Field 값이 유효하지 않음
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/channels/public"
                  method: "POST"
                  status: 400
                  code: "INVALID_BODY_VALUE"
                  message: "Request body value not valid"
                  details:
                    - "name: 공백일 수 없습니다"
                    - "name: 크기가 1에서 100 사이여야 합니다"
                    - "description: 크기가 0에서 1024 사이여야 합니다"
              invalidJSON:
                description: JSON parsing 실패
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/channels/public"
                  method: "POST"
                  status: 400
                  code: "INVALID_JSON"
                  message: "Unable to read request body, please check JSON format and field type"
                  details:
                    - "Unexpected character ('}' (code 125)): was expecting double-quote to start field name\n at [Source: REDACTED (`StreamReadFeature.INCLUDE_SOURCE_IN_LOCATION` disabled); line: 4, column: 1]"

privateChannels:
  post:
    tags:
      - Channel
    summary: Private Channel 생성
    operationId: createPrivate
    description: |-
      비공개 채널을 생성합니다.
      
      - 참가자는 2~10명 사이여야 합니다.
      - 참가자가 2명인 DM 채널은 중복해서 생성할 수 없습니다.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/channel.yaml#/PrivateChannelCreateRequest"
          example:
            participantIds:
              - "6d33007b-1a77-4c70-b295-7feaccf8aaf8"
              - "9fe4d0a6-aea9-4381-86fa-9bb2205aa62f"
              - "2589ffe4-1f98-4f64-82cf-d1857e7f42f8"
              - "c09a1bc3-644c-4b9f-8a36-f7cc3334535b"
    responses:
      '201':
        description: Private Channel이 성공적으로 생성됨
        content:
          application/json:
            schema:
              $ref: "../schemas/channel.yaml#/ChannelSaveResponse"
            example:
              id: "9b80f2ab-838d-49b5-881f-344fe310acdb"
              createdAt: "2025-08-19T09:07:47.200570Z"
              updatedAt: "2025-08-19T09:07:47.200570Z"
              type: "PRIVATE"
              name: null
              description: null
      '400':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              invalidField:
                description: Body Field 값이 유효하지 않음
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/channels/private"
                  method: "POST"
                  status: 400
                  code: "INVALID_BODY_VALUE"
                  message: "Request body value not valid"
                  details:
                    - "participantIds: 널이어서는 안됩니다"
                    - "participantIds: 비공개 채널은 2명~10명 사이여야 합니다"
              invalidJSON:
                description: JSON parsing 실패
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/channels/private"
                  method: "POST"
                  status: 400
                  code: "INVALID_JSON"
                  message: "Unable to read request body, please check JSON format and field type"
                  details:
                    - "Cannot deserialize value of type `java.util.UUID` from String \"not-uuid\": UUID has to be represented by standard 36-char representation\n at [Source: REDACTED (`StreamReadFeature.INCLUDE_SOURCE_IN_LOCATION` disabled); line: 2, column: 22] (through reference chain: com.sprint.mission.discodeit.dto.request.channel.PrivateChannelCreateRequest[\"participantIds\"]->java.util.HashSet[0])"
      '404':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              userNotFound:
                description: participantIds에 존재하지 않는 User가 포함됨
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/channels/private"
                  method: "POST"
                  status: 404
                  code: "RESOURCE_NOT_FOUND"
                  message: "User with id e6681542-a6b1-43f3-b759-6dc9cfebcf41 not found"
      '409':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              duplicatePrivateChannel:
                description: 1:1 DM 채널이 이미 존재함
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/channels/private"
                  method: "POST"
                  status: 409
                  code: "CONFLICT"
                  message: "Private channel between e6681542-a6b1-43f3-b759-6dc9cfebcf41, 983ef160-4389-4d80-aadc-13a772525173 already exists"
channelById:
  delete:
    tags:
      - Channel
    summary: Channel 삭제
    operationId: delete
    description: 채널을 삭제합니다.
    parameters:
      - $ref: "../openapi-channels.yaml#/components/parameters/ChannelIdInPath"
    responses:
      '204':
        description: Channel이 성공적으로 삭제됨
      '404':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              channelNotFound:
                description: Channel을 찾을 수 없음
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/channels/e6681542-a6b1-43f3-b759-6dc9cfebcf42"
                  method: "DELETE"
                  status: 404
                  code: "RESOURCE_NOT_FOUND"
                  message: "Channel with id e6681542-a6b1-43f3-b759-6dc9cfebcf42 not found"
  patch:
    tags:
      - Channel
    summary: Channel 정보 수정
    operationId: update
    parameters:
      - $ref: "../openapi-channels.yaml#/components/parameters/ChannelIdInPath"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/channel.yaml#/PublicChannelUpdateRequest"
    responses:
      '200':
        description: Channel 정보가 성공적으로 수정됨
        content:
          application/json:
            schema:
              $ref: "../schemas/channel.yaml#/ChannelSaveResponse"
      '400':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              invalidChannelType:
                description: Private channel은 수정할 수 없음
