login:
  post:
    tags:
      - Auth
    summary: 로그인
    description: 사용자명, 비밀번호로 로그인합니다.
    operationId: login
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/auth.yaml#/LoginRequest"
          example:
            username: "test"
            password: "P@ssw0rd123!"
    responses:
      '200':
        description: 로그인 성공
        content:
          application/json:
            schema:
              $ref: "../schemas/user.yaml#/UserDto"
            example:
              id: "e6681542-a6b1-43f3-b759-6dc9cfebcf41"
              username: "test"
              email: "test@codeit.com"
              profile: null
              online: true
      '400':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              invalidField:
                description: Body field 값이 유효하지 않음
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/auth/login"
                  method: "POST"
                  status: 400
                  code: "INVALID_BODY_VALUE"
                  message: "Request body value not valid"
                  details:
                    - "username: 공백일 수 없습니다"
                    - "username: 크기가 2에서 32 사이여야 합니다"
                    - "password: 공백일 수 없습니다"
                    - "password: 크기가 8에서 72 사이여야 합니다"
              invalidJson:
                description: JSON parsing 실패
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/auth/login"
                  method: "POST"
                  status: 400
                  code: "INVALID_JSON"
                  message: "Unable to read request body, please check JSON format and field type"
                  details:
                    - "Unexpected character ('}' (code 125)): was expecting double-quote to start field name\n at [Source: REDACTED (`StreamReadFeature.INCLUDE_SOURCE_IN_LOCATION` disabled); line: 4, column: 1]"
      '401':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              unauthorized:
                description: 사용자명 또는 비밀번호가 일치하지 않음
                value:
                  timestamp: "2025-08-17T15:31:00Z"
                  path: "/api/auth/login"
                  method: "POST"
                  status: 401
                  code: "UNAUTHORIZED"
                  message: "Username or password incorrect"
logout:
  post:
    tags:
      - Auth
    summary: 로그아웃
    description: |-
      - 사용자의 현재 세션/상태를 로그아웃 처리합니다.
      - **userId**를 body로 받습니다.
    operationId: logout
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../schemas/auth.yaml#/LogoutRequest"
    responses:
      '204':
        description: 로그아웃 성공
      '400':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              invalidField:
                description: Body field 값이 유효하지 않음
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/auth/logout"
                  method: "POST"
                  status: 400
                  code: "INVALID_BODY_VALUE"
                  message: "Request body value not valid"
                  details:
                    - "userId: 널이어서는 안됩니다"
              invalidJson:
                description: JSON parsing 실패
                value:
                  timestamp: "2025-08-16T12:34:56Z"
                  path: "/api/auth/logout"
                  method: "POST"
                  status: 400
                  code: "INVALID_JSON"
                  message: "Unable to read request body, please check JSON format and field type"
                  details:
                    - "Cannot deserialize value of type `java.util.UUID` from String \"not-uuid\": UUID has to be represented by standard 36-char representation\n at [Source: REDACTED (`StreamReadFeature.INCLUDE_SOURCE_IN_LOCATION` disabled); line: 2, column: 15] (through reference chain: com.sprint.mission.discodeit.dto.auth.AuthLogoutRequest[\"userId\"])"
      '404':
        content:
          application/json:
            schema:
              $ref: "../schemas/error.yaml#/ApiError"
            examples:
              userNotFound:
                description: User를 찾을 수 없음
                value:
                  timestamp: "2025-08-17T15:30:02Z"
                  path: "/api/auth/logout"
                  method: "POST"
                  status: 404
                  code: "RESOURCE_NOT_FOUND"
                  message: "User with id e6681542-a6b1-43f3-b759-6dc9cfebcf41 not found"
