openapi: 3.0.3
info:
  title: Discodeit Read Status API
  version: "1.0.0"
  description: 메시지 읽음 상태(ReadStatus) 관련 API 문서
servers:
  - url: /api
paths:
  /readStatuses:
    $ref: "./paths/readStatuses.yaml#/readStatusesRoot"
  /readStatuses/{readStatusId}:
    $ref: "./paths/readStatuses.yaml#/readStatusById"
components:
  parameters:
    ReadStatusIdInPath:
      in: path
      name: readStatusId
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    ReadStatusDto:
      $ref: "./schemas/readStatus.yaml#/ReadStatusDto"
    ReadStatusCreateRequest:
      $ref: "./schemas/readStatus.yaml#/ReadStatusCreateRequest"
    ReadStatusUpdateRequest:
      $ref: "./schemas/readStatus.yaml#/ReadStatusUpdateRequest"
    ApiError:
      $ref: "./schemas/error.yaml#/ApiError"
