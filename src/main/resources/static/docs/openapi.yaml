openapi: 3.0.3
info:
  title: Discodeit API
  version: "1.0.0"
servers:
  - url: /api

paths:
  /users:
    post:
      tags: [ Users ]
      summary: 사용자 등록
      description: 새 사용자를 등록합니다. 성공 시 201과 함께 생성된 사용자 정보를 반환합니다. 이 엔드포인트는 인증이 필요하지 않습니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegisterRequest'
            example:
              email: alice@example.com
              globalName: Alice Kim
              username: alice.k
              password: P@ssw0rd123
              birthDate: '2001-05-10'
              subscribedToNewsletter: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      tags: [ Users ]
      summary: 사용자 목록 조회
      description: 모든 사용자를 조회하거나, username / email 조건으로 검색합니다.
      parameters:
        - in: query
          name: username
          schema:
            type: string
          required: false
          description: username으로 사용자 검색
        - in: query
          name: email
          schema:
            type: string
            format: email
          required: false
          description: email로 사용자 검색
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /users/{id}:
    get:
      tags: [ Users ]
      summary: 사용자 단건 조회
      description: ID(UUID)로 사용자를 조회합니다.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: 사용자 UUID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                timestamp: "2025-08-16T12:34:56Z"
                code: "NOT_FOUND"
                message: "사용자를 찾을 수 없습니다."
                details:
                  - "GET /api/users/{id}"
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
    delete:
      tags: [ Users ]
      summary: 사용자 삭제 (소프트 삭제)
      description: |
        사용자 계정을 소프트 삭제합니다.
        또한 사용자가 **owner**인 길드를 소프트 삭제하고,
        해당 사용자가 보낸/받은 **친구 요청**도 함께 소프트 삭제합니다.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: 사용자 UUID
      responses:
        '204':
          description: No Content
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              example:
                timestamp: "2025-08-16T12:34:56Z"
                code: "NOT_FOUND"
                message: "사용자를 찾을 수 없습니다."
                details:
                  - "DELETE /api/users/{id}"
        '400':
          $ref: '#/components/responses/BadRequest'
        '405':
          $ref: '#/components/responses/MethodNotAllowed'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  schemas:
    UserRegisterRequest:
      type: object
      required: [ email, username, password, birthDate ]
      properties:
        email:
          type: string
          format: email
          minLength: 6
          maxLength: 254
          description: 서버에서 strip+lowercase 정규화됨
        globalName:
          type: string
          nullable: true
          maxLength: 32
          description: 빈 문자열은 서버에서 null로 처리됨
        username:
          type: string
          minLength: 2
          maxLength: 32
          pattern: "^(?!.*\\.\\.)[A-Za-z0-9._]+$"
          description: 서버에서 strip+lowercase 정규화됨
        password:
          type: string
          minLength: 8
          maxLength: 72
          description: 서버에서 해시 저장됨
        birthDate:
          type: string
          format: date
        subscribedToNewsletter:
          type: boolean
          default: false

    UserRegisterResponse:
      type: object
      required: [ id, email, username, globalName ]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          maxLength: 254
        username:
          type: string
          maxLength: 32
        globalName:
          type: string
          nullable: true
          maxLength: 32

    UserResponse:
      type: object
      required: [ id, createdAt, updatedAt, email, username, globalName ]
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        email:
          type: string
          format: email
        username:
          type: string
          maxLength: 32
        globalName:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        profileId:
          type: string
          format: uuid
          nullable: true
        userStatusType:
          type: string
          enum: [ ONLINE, OFFLINE, IDLE, DO_NOT_DISTURB ]

    ApiError:
      type: object
      required: [ timestamp, code, message, details ]
      properties:
        timestamp: { type: string, format: date-time }
        code: { type: string, example: "BAD_REQUEST" }
        message: { type: string, example: "요청이 올바르지 않습니다." }
        details:
          type: array
          items: { type: string }
          description: 추가 정보(필드 에러, 경로, requestId 등)

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            validation:
              summary: 유효성 검증 실패
              value:
                timestamp: "2025-08-16T12:34:56Z"
                code: "BAD_REQUEST"
                message: "요청이 올바르지 않습니다."
                details:
                  - "email: must be a well-formed email address"
                  - "POST /api/users"
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            timestamp: "2025-08-16T12:34:56Z"
            code: "CONFLICT"
            message: "이미 사용 중인 이메일 또는 사용자명입니다."
            details: [ ]
    MethodNotAllowed:
      description: Method Not Allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            timestamp: "2025-08-16T12:34:56Z"
            code: "METHOD_NOT_ALLOWED"
            message: "허용되지 않은 메서드입니다."
            details:
              - "PATCH /api/users (allowed: [POST])"
    InternalError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example:
            timestamp: "2025-08-16T12:34:56Z"
            code: "INTERNAL_ERROR"
            message: "서버 오류가 발생했습니다."
            details: [ ]
