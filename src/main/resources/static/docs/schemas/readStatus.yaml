ReadStatusDto:
  type: object
  required:
    - id
    - userId
    - channelId
    - lastReadAt
  properties:
    id:
      type: string
      format: uuid
    userId:
      type: string
      format: uuid
    channelId:
      type: string
      format: uuid
    lastReadAt:
      type: string
      format: date-time

ReadStatusCreateRequest:
  type: object
  description: Message 읽음 상태 생성 정보
  required:
    - userId
    - channelId
    - lastReadAt
  properties:
    userId:
      type: string
      format: uuid
    channelId:
      type: string
      format: uuid
    lastReadAt:
      type: string
      format: date-time

ReadStatusUpdateRequest:
  type: object
  description: Message 읽음 상태 생성 정보
  properties:
    newLastReadAt:
      type: string
      format: date-time
