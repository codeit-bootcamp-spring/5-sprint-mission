BinaryContentResponse:
  type: object
  required: [ id, filename, contentType, size, createdAt ]
  properties:
    id:
      type: string
      format: uuid
      description: 바이너리 콘텐츠 ID
    filename:
      type: string
      description: 서버에 저장된 파일명(확장자 포함)
      example: "avatar_9f3a1c.png"
    contentType:
      type: string
      description: MIME 타입
      example: "image/png"
    size:
      type: integer
      format: int64
      description: 바이트 단위 파일 크기
      example: 125834
    createdAt:
      type: string
      format: date-time
      description: 생성 일시(UTC)
      example: "2025-08-17T15:30:00Z"
