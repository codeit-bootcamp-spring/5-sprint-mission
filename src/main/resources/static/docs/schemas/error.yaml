ApiError:
  type: object
  required:
    - timestamp
    - path
    - method
    - status
    - code
    - message
  properties:
    timestamp:
      type: string
      format: date-time
      description: 오류 발생 시각(UTC)
    path:
      type: string
      description: 요청 uri
    method:
      type: string
      description: 요청 method
      enum:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
    status:
      type: integer
      description: 리스폰스 상태 코드
      minimum: 400
      maximum: 599
    code:
      type: string
      description: 애플리케이션 오류 코드
      enum:
        - BAD_REQUEST
        - VALIDATION_ERROR
        - UNAUTHORIZED
        - FORBIDDEN
        - NOT_FOUND
        - METHOD_NOT_ALLOWED
        - CONFLICT
        - UNSUPPORTED_MEDIA_TYPE
        - INTERNAL_ERROR
    message:
      type: string
      description: 사용자 표시용 메시지
      minLength: 1
    details:
      type: array
      description: 세부 오류 목록
      items:
        type: string
        minLength: 1
