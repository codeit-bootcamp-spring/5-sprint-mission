ApiError:
  type: object
  additionalProperties: false
  required:
    - timestamp
    - path
    - method
    - status
    - code
    - message
  properties:
    timestamp:
      type: string
      format: date-time
      description: 오류 발생 시각(UTC)
    path:
      type: string
      minLength: 1
      description: 요청 URI
    method:
      type: string
      enum:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - HEAD
        - OPTIONS
      description: 요청 HTTP 메서드
    status:
      type: integer
      minimum: 400
      maximum: 599
      description: HTTP 상태 코드
    code:
      type: string
      enum:
        - BAD_REQUEST
        - INVALID_JSON
        - INVALID_BODY_VALUE
        - INVALID_PARAMETER_TYPE
        - INVALID_PARAMETER_NUMBER
        - INVALID_PARAMETER_VALUES
        - INVALID_JSON
        - MISSING_PART
        - UNAUTHORIZED
        - FORBIDDEN
        - ENDPOINT_NOT_FOUND
        - RESOURCE_NOT_FOUND
        - METHOD_NOT_ALLOWED
        - NOT_ACCEPTABLE
        - CONFLICT
        - UNSUPPORTED_MEDIA_TYPE
        - TOO_MANY_REQUESTS
        - INTERNAL_ERROR
      description: 애플리케이션 오류 코드
    message:
      type: string
      minLength: 1
      description: 사용자에게 표시할 기본 오류 메시지
    details:
      type: array
      items:
        type: string
        minLength: 1
      minItems: 1
      description: 세부 오류 목록
