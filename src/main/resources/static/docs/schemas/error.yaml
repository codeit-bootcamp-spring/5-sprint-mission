ApiError:
  type: object
  additionalProperties: false
  required:
    - timestamp
    - path
    - method
    - status
    - code
    - message
  properties:
    timestamp:
      type: string
      format: date-time
      description: 오류 발생 시각(UTC)
    path:
      type: string
      description: 요청 URI
    method:
      type: string
      enum:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - HEAD
        - OPTIONS
      description: 요청 HTTP 메서드
    status:
      type: integer
      minimum: 400
      maximum: 599
      description: HTTP 상태 코드
    code:
      type: string
      description: 애플리케이션 오류 코드
    message:
      type: string
      description: 사용자에게 표시할 기본 오류 메시지
    details:
      type: array
      items:
        type: string
      description: 세부 오류 목록
