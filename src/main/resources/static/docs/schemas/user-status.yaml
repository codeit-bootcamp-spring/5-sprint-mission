UserStatusType:
  type: string
  description: >
    사용자 상태 타입. 각 값은 한국어 표시 이름과 매핑됩니다.
    - ONLINE → "온라인"
    - DO_NOT_DISTURB → "방해 금지"
    - IDLE → "자리 비움"
    - OFFLINE → "오프라인 표시"
  enum: [ ONLINE, DO_NOT_DISTURB, IDLE, OFFLINE ]
  example: DO_NOT_DISTURB

UserStatusUpdateRequest:
  type: object
  required: [ userStatusType ]
  properties:
    userStatusType:
      $ref: "#/UserStatusType"
  example:
    userStatusType: "ONLINE"

UserStatusUpdateResponse:
  type: object
  required: [ userId, displayName ]
  properties:
    userId: { type: string, format: uuid }
    displayName: { type: string }
  example:
    userId: "2f9b1b3f-5b5d-4f5f-91a1-6c3c2b2a1a11"
    displayName: "방해 금지"
