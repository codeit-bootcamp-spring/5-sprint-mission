FriendRequestSendRequest:
  type: object
  required: [ senderId, receiverUsername ]
  properties:
    senderId:
      type: string
      format: uuid
      description: 요청을 보낸 사용자 ID
    receiverUsername:
      type: string
      description: 요청을 받을 사용자 username
  example:
    senderId: "2f9b1b3f-5b5d-4f5f-91a1-6c3c2b2a1a11"
    receiverUsername: "bob"

FriendRequestHandleRequest:
  type: object
  required: [ userId ]
  properties:
    userId:
      type: string
      format: uuid
      description: 이 액션을 수행하는 사용자 ID(수락/거절/취소 요청자)
  example:
    userId: "2f9b1b3f-5b5d-4f5f-91a1-6c3c2b2a1a11"

FriendRequestResponse:
  type: object
  required:
    - id
    - createdAt
    - senderId
    - senderUsername
    - receiverId
    - receiverUsername
  properties:
    id:
      type: string
      format: uuid
      description: 친구 요청 ID
    createdAt:
      type: string
      format: date-time
      description: 생성 일시(UTC)
    senderId:
      type: string
      format: uuid
      description: 보낸 사용자 ID
    senderProfileId:
      type: string
      format: uuid
      nullable: true
      description: 보낸 사용자의 프로필 이미지 ID
    senderUsername:
      type: string
      description: 보낸 사용자의 username
    senderGlobalName:
      type: string
      nullable: true
      description: 보낸 사용자의 글로벌 이름
    receiverId:
      type: string
      format: uuid
      description: 받는 사용자 ID
    receiverProfileId:
      type: string
      format: uuid
      nullable: true
      description: 받는 사용자의 프로필 이미지 ID
    receiverUsername:
      type: string
      description: 받는 사용자의 username
    receiverGlobalName:
      type: string
      nullable: true
      description: 받는 사용자의 글로벌 이름
  example:
    id: "f88b1cc6-e399-45c1-99d5-5b6ae1971cb1"
    createdAt: "2025-08-17T16:54:01.452803Z"
    senderId: "8b2aba84-5f3e-4ae5-b09a-6e05c95c3e7d"
    senderProfileId: "67f70412-53af-43f5-9a2e-b46a8942d1c3"
    senderUsername: "rex"
    receiverId: "099b1ff2-5b5d-132f-91a1-6c3c2b2a15j2"
    receiverProfileId: null
    receiverUsername: "test2"
