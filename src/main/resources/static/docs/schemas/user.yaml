UserResponse:
  type: object
  required:
    - id
    - createdAt
    - updatedAt
    - username
    - email
    - profileId
    - online
  properties:
    id:
      type: string
      format: uuid
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    username:
      type: string
    email:
      type: string
      format: email
    profileId:
      type: string
      format: uuid
      nullable: true
    online:
      type: boolean

UserCreateRequest:
  type: object
  description: User 생성 정보
  required:
    - username
    - email
    - password
  properties:
    username:
      type: string
      minLength: 2
      maxLength: 32
      pattern: "^(?!.*\\.\\.)[A-Za-z0-9._]+$"
      description: 입력 값은 서버에서 **strip** 후 소문자로 정규화됨
    email:
      type: string
      format: email
      minLength: 6
      maxLength: 254
      description: 입력 값은 서버에서 **strip** 후 소문자로 정규화됨
    password:
      type: string
      minLength: 8
      maxLength: 72
      description: 입력 값은 서버에서 **strip** 후 해시로 인코딩됨

UserSaveResponse:
  type: object
  required:
    - id
    - createdAt
    - updatedAt
    - username
    - email
    - password
    - profileId
  properties:
    id:
      type: string
      format: uuid
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    username:
      type: string
    email:
      type: string
      format: email
    password:
      type: string
    profileId:
      type: string
      format: uuid
      nullable: true

UserUpdateRequest:
  type: object
  description: 수정할 User 정보
  properties:
    newUsername:
      type: string
      nullable: true
      minLength: 2
      maxLength: 32
      pattern: "^(?!.*\\.\\.)[A-Za-z0-9._]+$"
      description: 입력 값은 서버에서 **strip** 후 소문자로 정규화됨
    newEmail:
      type: string
      nullable: true
      format: email
      minLength: 6
      maxLength: 254
      description: 입력 값은 서버에서 **strip** 후 소문자로 정규화됨
    newPassword:
      type: string
      nullable: true
      minLength: 8
      maxLength: 72
      description: 입력 값은 서버에서 **strip** 후 해시로 인코딩됨
