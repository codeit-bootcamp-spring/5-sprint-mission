UserResponse:
  type: object
  required: [ id, createdAt, updatedAt, email, username, online ]
  properties:
    id:
      type: string
      format: uuid
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    username:
      type: string
    email:
      type: string
      format: email
    profileId:
      type: string
      format: uuid
      nullable: true
    online:
      type: boolean

UserCreateRequest:
  type: object
  required:
    - username
    - email
    - password
  properties:
    username:
      type: string
      minLength: 2
      maxLength: 32
      pattern: "^(?!.*\\.\\.)[A-Za-z0-9._]+$"
      description: 서버에서 strip+lowercase 정규화됨
    email:
      type: string
      format: email
      minLength: 6
      maxLength: 254
      description: 서버에서 strip+lowercase 정규화됨
    password:
      type: string
      minLength: 8
      maxLength: 72
      description: 서버에서 해시 저장됨

UserCreateResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    username:
      type: string
    email:
      type: string
      format: email
    password:
      type: string
    profileId:
      type: string
      format: uuid
      nullable: true

UserUpdateProfileSettingsRequest:
  type: object
  properties:
    globalName:
      type: string
      nullable: true
      maxLength: 32
      description: 빈 문자열은 서버에서 null 처리
    bio:
      type: string
      nullable: true
      maxLength: 2000

UserUpdateProfileImageRequest:
  type: object
  required: [ profileId ]
  properties:
    profileId: { type: string, format: uuid }

UserUpdateEmailRequest:
  type: object
  required: [ email ]
  properties:
    email:
      type: string
      format: email
      minLength: 6
      maxLength: 254
      description: 서버에서 strip+lowercase 정규화됨

UserUpdateUsernameRequest:
  type: object
  required: [ username ]
  properties:
    username:
      type: string
      minLength: 2
      maxLength: 32
      pattern: "^(?!.*\\.\\.)[A-Za-z0-9._]+$"
      description: 서버에서 strip+lowercase 정규화됨

UserUpdatePasswordRequest:
  type: object
  required: [ password ]
  properties:
    password:
      type: string
      minLength: 8
      maxLength: 72

UserUpdatePhoneNumberRequest:
  type: object
  required: [ phoneNumber ]
  properties:
    phoneNumber:
      type: string
      description:
        "E.164 국제 표준. 예: +821012345678"
      pattern: "^\\+[1-9]\\d{7,14}$"
      minLength: 9
      maxLength: 16