MessageDto:
  type: object
  required:
    - id
    - createdAt
    - updatedAt
    - content
    - channelId
    - author
    - attachments
  properties:
    id:
      type: string
      format: uuid
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    content:
      type: string
      nullable: true
    channelId:
      type: string
      format: uuid
    author:
      $ref: "../schemas/user.yaml#/UserDto"
    attachments:
      type: array
      items:
        $ref: "../schemas/binaryContent.yaml#/BinaryContentDto"
      uniqueItems: true

MessageCreateRequest:
  type: object
  description: Message 생성 정보
  required:
    - channelId
    - authorId
  properties:
    content:
      type: string
      maxLength: 2000
    channelId:
      type: string
      format: uuid
    authorId:
      type: string
      format: uuid

MessageUpdateRequest:
  type: object
  description: 수정할 Message 내용
  properties:
    newContent:
      type: string
      maxLength: 2000
