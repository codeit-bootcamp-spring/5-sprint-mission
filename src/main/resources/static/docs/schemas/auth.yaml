LoginRequest:
  type: object
  required:
    - username
    - password
  properties:
    username:
      type: string
      minLength: 2
      maxLength: 32
      pattern: "^(?!.*\\.\\.)[A-Za-z0-9._]+$"
      description: 입력 값은 대소문자 모두 허용되지만, 서버에서 strip 후 소문자로 정규화하여 처리됨
    password:
      type: string
      minLength: 8
      maxLength: 72
      description: 입력 값은 서버에서 strip 후 해시로 인코딩됨

LogoutRequest:
  type: object
  required:
    - userId
  properties:
    userId:
      type: string
      format: uuid
      description: 로그아웃 대상 사용자 ID
