LoginRequest:
  type: object
  required:
    - email
    - password
  properties:
    email:
      type: string
      format: email
      minLength: 6
      maxLength: 254
      description: 입력 값은 서버에서 **strip** 후 소문자로 정규화됨
    password:
      type: string
      minLength: 8
      maxLength: 72
      description: 입력 값은 서버에서 **strip** 후 해시로 인코딩됨

LogoutRequest:
  type: object
  required:
    - userId
  properties:
    userId:
      type: string
      format: uuid
      description: 로그아웃 대상 사용자 ID
