LoginRequest:
  type: object
  required: [ email, password ]
  properties:
    email:
      type: string
      format: email
      description: 로그인 이메일
    password:
      type: string
      minLength: 8
      maxLength: 72
      description: 비밀번호

LogoutRequest:
  type: object
  required: [ userId ]
  properties:
    userId:
      type: string
      format: uuid
      description: 로그아웃 대상 사용자 ID
