BinaryContentResponse:
  type: object
  required:
    - id
    - createdAt
    - fileName
    - size
    - contentType
    - bytes
  properties:
    id:
      type: string
      format: uuid
    createdAt:
      type: string
      format: date-time
    fileName:
      type: string
    size:
      type: integer
      format: int64
    contentType:
      type: string
    bytes:
      type: string
      format: byte
