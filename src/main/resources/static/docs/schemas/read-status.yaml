ReadStatusResponse:
  type: object
  properties:
    id:
      type: string
      format: uuid
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    userId:
      type: string
      format: uuid
    channelId:
      type: string
      format: uuid
    lastReadAt:
      type: string
      format: date-time

ReadStatusCreateRequest:
  type: object
  description: Message 읽음 상태 생성 정보
  required:
    - userId
    - channelId
    - lastReadAt
  properties:
    userId:
      type: string
      format: uuid
    channelId:
      type: string
      format: uuid
    lastReadAt:
      type: string
      format: date-time
