BadRequest:
  description: Bad Request
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yaml#/ApiError'
      examples:
        invalidJson:
          value:
            timestamp: "2025-08-16T12:34:56Z"
            path: "/api/*"
            method: "POST"
            status: 400
            code: "VALIDATION_ERROR"
            message: "요청 본문을 읽을 수 없습니다. JSON 형식과 필드 타입을 확인하세요."
            details:
              - "Unrecognized token 'True': was expecting (JSON String, Number, Array, Object or token 'null', 'true' or 'false') at line 7, column 35"

NotFound:
  description: Not Found
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yaml#/ApiError'
      example:
        timestamp: "2025-08-16T12:34:56Z"
        path: "/api/*/6c1c5c7a-6d7d-4e9d-8a1f-bb2b3c4d5e6f"
        method: "GET"
        status: 404
        code: "NOT_FOUND"
        message: "리소스를 찾을 수 없습니다: <UUID>"

Conflict:
  description: Conflict
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yaml#/ApiError'
      example:
        timestamp: "2025-08-16T12:34:56Z"
        path: "/api/*"
        method: "POST"
        status: 409
        code: "CONFLICT"
        message: "이미 사용 중인 이메일/사용자명입니다."

MethodNotAllowed:
  description: Method Not Allowed
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yaml#/ApiError'
      example:
        timestamp: "2025-08-16T12:34:56Z"
        path: "/api/*"
        method: "PATCH"
        status: 405
        code: "METHOD_NOT_ALLOWED"
        message: "허용되지 않은 HTTP 메서드입니다."
        details:
          - "허용되는 메서드: POST, GET"

UnsupportedMediaType:
  description: Media Type Not Supported
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yaml#/ApiError'
      example:
        timestamp: "2025-08-16T12:34:56Z"
        path: "/api/*"
        method: "POST"
        status: 415
        code: "UNSUPPORTED_MEDIA_TYPE"
        message: "허용되지 않은 미디어 타입입니다. 지원되는 타입: application/json, application/yaml, application/*+json"
        details:
          - "Content-Type 'image/png;charset=UTF-8' is not supported"

InternalError:
  description: Internal Server Error
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yaml#/ApiError'
      example:
        timestamp: "2025-08-16T12:34:56Z"
        path: "/api/*"
        method: "POST"
        status: 500
        code: "INTERNAL_ERROR"
        message: "예상치 못한 오류가 발생했습니다."
