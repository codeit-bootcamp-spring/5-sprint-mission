BadRequest:
  description: Bad Request
  content:
    application/json:
      schema: { $ref: '../schemas/error.yaml#/ApiError' }
      examples:
        validation:
          summary: 유효성 검증 실패
          value:
            timestamp: "2025-08-16T12:34:56Z"
            code: "BAD_REQUEST"
            message: "요청이 올바르지 않습니다."
            details:
              - "email: must be a well-formed email address"
              - "GET /api/users?username=...&email=..."
NotFound:
  description: Not Found
  content:
    application/json:
      schema: { $ref: '../schemas/error.yaml#/ApiError' }
      example:
        timestamp: "2025-08-16T12:34:56Z"
        code: "NOT_FOUND"
        message: "리소스를 찾을 수 없습니다."
        details: [ ]
Conflict:
  description: Conflict
  content:
    application/json:
      schema: { $ref: '../schemas/error.yaml#/ApiError' }
      example:
        timestamp: "2025-08-16T12:34:56Z"
        code: "CONFLICT"
        message: "이미 사용 중인 이메일 또는 사용자명입니다."
        details: [ ]
MethodNotAllowed:
  description: Method Not Allowed
  content:
    application/json:
      schema: { $ref: '../schemas/error.yaml#/ApiError' }
      example:
        timestamp: "2025-08-16T12:34:56Z"
        code: "METHOD_NOT_ALLOWED"
        message: "허용되지 않은 메서드입니다."
        details:
          - "PATCH /api/users (allowed: [POST])"
InternalError:
  description: Internal Server Error
  content:
    application/json:
      schema: { $ref: '../schemas/error.yaml#/ApiError' }
      example:
        timestamp: "2025-08-16T12:34:56Z"
        code: "INTERNAL_ERROR"
        message: "서버 오류가 발생했습니다."
        details: [ ]
