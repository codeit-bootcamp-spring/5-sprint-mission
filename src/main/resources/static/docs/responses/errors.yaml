BadRequest:
  description: Bad Request
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yaml#/ApiError'
      example:
        timestamp: "2025-08-16T12:34:56Z"
        path: "/api/users"
        method: "POST"
        status: 400
        code: "BAD_REQUEST"
        message: "요청이 올바르지 않습니다."
        details:
          - "요청 본문을 읽을 수 없습니다. JSON 형식과 필드 타입을 확인하세요"
          - "Unrecognized token 'True': was expecting (JSON String, Number, Array, Object or token 'null', 'true' or 'false') at line 7, column 35"

NotFound:
  description: Not Found
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yaml#/ApiError'
      example:
        timestamp: "2025-08-16T12:34:56Z"
        path: "/api/users/2f9b1b3f-5b5d-4f5f-91a1-6c3c2b2a1a11"
        method: "GET"
        status: 404
        code: "NOT_FOUND"
        message: "User with id 2f9b1b3f-5b5d-4f5f-91a1-6c3c2b2a1a11 not found"

Conflict:
  description: Conflict
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yaml#/ApiError'
      example:
        timestamp: "2025-08-16T12:34:56Z"
        path: "/api/users"
        method: "POST"
        status: 409
        code: "CONFLICT"
        message: "User with email alice@example.com already exists"

MethodNotAllowed:
  description: Method Not Allowed
  headers:
    Allow:
      description: 허용되는 메서드 목록(콤마 구분)
      schema:
        type:string
      example: "GET, POST"
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yaml#/ApiError'
      example:
        timestamp: "2025-08-16T12:34:56Z"
        path: "/api/users"
        method: "PATCH"
        status: 405
        code: "METHOD_NOT_ALLOWED"
        message: "허용되지 않은 HTTP 메서드입니다."

UnsupportedMediaType:
  description: Unsupported Media Type
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yaml#/ApiError'
      example:
        timestamp: "2025-08-16T12:34:56Z"
        path: "/api/users"
        method: "POST"
        status: 415
        code: "UNSUPPORTED_MEDIA_TYPE"
        message: "Media type not allowed. Supported types: application/json, application/*+json, application/yaml"
        details:
          - "Content-Type 'application/octet-stream' not supported"

InternalError:
  description: Internal Server Error
  content:
    application/json:
      schema:
        $ref: '../schemas/error.yaml#/ApiError'
      example:
        timestamp: "2025-08-16T12:34:56Z"
        path: "/api/users"
        method: "POST"
        status: 500
        code: "INTERNAL_ERROR"
        message: "예상치 못한 오류가 발생했습니다."
