components:
  schemas:
    UserRoleUpdateRequest:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        newRole:
          type: string
          enum:
            - ADMIN
            - USER
            - CHANNEL_MANAGER
    BinaryContentDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        fileName:
          type: string
        size:
          type: integer
          format: int64
        contentType:
          type: string
        status:
          type: string
          enum:
            - PROCESSING
            - SUCCESS
            - FAIL
    UserDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        profile:
          type: object
          properties:
            id:
              type: string
              format: uuid
            fileName:
              type: string
            size:
              type: integer
              format: int64
            contentType:
              type: string
            status:
              type: string
              enum:
                - PROCESSING
                - SUCCESS
                - FAIL
        online:
          type: boolean
        role:
          type: string
          enum:
            - ADMIN
            - USER
            - CHANNEL_MANAGER
    UserCreateRequest:
      type: object
      description: User 생성 정보
      properties:
        username:
          type: string
          maxLength: 50
          minLength: 4
        email:
          type: string
          maxLength: 100
          minLength: 0
        password:
          type: string
          maxLength: 20
          minLength: 8
      required:
        - email
        - password
        - username
    ReadStatusCreateRequest:
      type: object
      description: Message 읽음 상태 생성 정보
      properties:
        userId:
          type: string
          format: uuid
        channelId:
          type: string
          format: uuid
        lastReadAt:
          type: string
          format: date-time
      required:
        - channelId
        - userId
    ReadStatusDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        channelId:
          type: string
          format: uuid
        lastReadAt:
          type: string
          format: date-time
        notificationEnabled:
          type: boolean
    MessageCreateRequest:
      type: object
      description: Message 생성 정보
