          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        content:
          type: string
        channelId:
          type: string
          format: uuid
        author:
          type: object
          properties:
            id:
              type: string
              format: uuid
            username:
              type: string
            email:
              type: string
            profile:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                fileName:
                  type: string
                size:
                  type: integer
                  format: int64
                contentType:
                  type: string
                status:
                  type: string
                  enum:
                    - PROCESSING
                    - SUCCESS
                    - FAIL
            online:
              type: boolean
            role:
              type: string
              enum:
                - ADMIN
                - USER
                - CHANNEL_MANAGER
        attachments:
