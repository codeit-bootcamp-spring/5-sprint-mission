          minLength: 0
    NotificationDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        receiverId:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
    Pageable:
      type: object
      properties:
        page:
          type: integer
          format: int32
