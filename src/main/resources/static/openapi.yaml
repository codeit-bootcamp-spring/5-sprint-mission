          minLength: 0
        description:
          type: string
          maxLength: 500
          minLength: 0
      required:
        - name
    ChannelDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - PUBLIC
            - PRIVATE
