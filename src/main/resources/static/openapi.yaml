openapi: 3.1.0
info:
  title: Discodeit API 문서
  description: Discodeit 프로젝트의 Swagger API 문서입니다.
  version: v2.2-M11
servers:
  - url: http://localhost:8080
    description: 로컬 서버
tags:
  - name: Channel
    description: Channel API
  - name: BinaryContent
    description: 첨부파일 API
  - name: ReadStatus
    description: Message 읽음 상태 API
  - name: Message
    description: Message API
  - name: User
    description: User API
  - name: Auth
    description: 인증 API
  - name: Notification
    description: 알림 API
paths:
  /api/auth/role:
    put:
      tags:
        - Auth
      summary: 사용자 권한 수정
      operationId: updateRole
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  format: uuid
                newRole:
                  type: string
                  enum:
                    - ADMIN
                    - USER
                    - CHANNEL_MANAGER
        required: true
      responses:
        "200":
          description: 권한 변경 성공
          content:
            '*/*':
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  username:
                    type: string
                  email:
                    type: string
                  profile:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      fileName:
                        type: string
                      size:
                        type: integer
                        format: int64
                      contentType:
                        type: string
                      status:
                        type: string
                        enum:
                          - PROCESSING
                          - SUCCESS
                          - FAIL
                  online:
                    type: boolean
                  role:
                    type: string
                    enum:
                      - ADMIN
                      - USER
                      - CHANNEL_MANAGER
  /api/users:
    get:
      tags:
        - User
      summary: 전체 User 목록 조회
      operationId: findAll
      responses:
        "200":
          description: User 목록 조회 성공
          content:
            '*/*':
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    username:
                      type: string
                    email:
                      type: string
                    profile:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        fileName:
                          type: string
                        size:
                          type: integer
                          format: int64
                        contentType:
                          type: string
                        status:
                          type: string
                          enum:
                            - PROCESSING
                            - SUCCESS
                            - FAIL
                    online:
                      type: boolean
                    role:
                      type: string
                      enum:
                        - ADMIN
                        - USER
                        - CHANNEL_MANAGER
    post:
      tags:
        - User
      summary: User 등록
      operationId: create
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                userCreateRequest:
                  type: object
                  description: User 생성 정보
                  properties:
                    username:
                      type: string
                      maxLength: 50
                      minLength: 4
                    email:
                      type: string
                      maxLength: 100
                      minLength: 0
                    password:
                      type: string
                      maxLength: 20
                      minLength: 8
                  required:
                    - email
                    - password
                    - username
                profile:
                  type: string
                  format: binary
                  description: User 프로필 이미지
              required:
                - userCreateRequest
      responses:
        "201":
          description: User가 성공적으로 생성됨
          content:
            '*/*':
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  username:
                    type: string
                  email:
                    type: string
                  profile:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      fileName:
                        type: string
                      size:
                        type: integer
                        format: int64
                      contentType:
                        type: string
                      status:
                        type: string
                        enum:
                          - PROCESSING
                          - SUCCESS
                          - FAIL
                  online:
                    type: boolean
                  role:
                    type: string
                    enum:
                      - ADMIN
                      - USER
                      - CHANNEL_MANAGER
        "400":
          description: 같은 email 또는 username를 사용하는 User가 이미 존재함
          content:
            '*/*':
              example: "User with email {email} already exists"
  /api/readStatuses:
    get:
      tags:
        - ReadStatus
      summary: User의 Message 읽음 상태 목록 조회
      operationId: findAllByUserId
      parameters:
        - name: userId
          in: query
          description: 조회할 User ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Message 읽음 상태 목록 조회 성공
          content:
            '*/*':
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    userId:
                      type: string
                      format: uuid
                    channelId:
                      type: string
                      format: uuid
                    lastReadAt:
                      type: string
                      format: date-time
                    notificationEnabled:
                      type: boolean
    post:
      tags:
        - ReadStatus
      summary: Message 읽음 상태 생성
      operationId: create_1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Message 읽음 상태 생성 정보
              properties:
                userId:
                  type: string
                  format: uuid
                channelId:
                  type: string
                  format: uuid
                lastReadAt:
                  type: string
                  format: date-time
              required:
                - channelId
                - userId
        required: true
      responses:
        "201":
          description: Message 읽음 상태가 성공적으로 생성됨
          content:
            '*/*':
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  userId:
                    type: string
                    format: uuid
                  channelId:
                    type: string
                    format: uuid
                  lastReadAt:
                    type: string
                    format: date-time
                  notificationEnabled:
                    type: boolean
        "400":
          description: 이미 읽음 상태가 존재함
          content:
            '*/*':
              example: "ReadStatus with userId {userId} and channelId {channelId} already exists"
        "404":
          description: Channel 또는 User를 찾을 수 없음
          content:
            '*/*':
              example: "Channel | User with id {channelId | userId} not found"
  /api/messages:
    get:
      tags:
        - Message
      summary: Channel의 Message 목록 조회
      operationId: findAllByChannelId
      parameters:
        - name: channelId
          in: query
          description: 조회할 Channel ID
          required: true
          schema:
            type: string
            format: uuid
        - name: cursor
          in: query
          description: 페이징 커서 정보
          required: false
          schema:
            type: string
            format: date-time
        - name: pageable
          in: query
          description: 페이징 정보
          required: true
          schema:
            type: object
            properties:
              page:
                type: integer
                format: int32
                minimum: 0
              size:
                type: integer
                format: int32
                minimum: 1
              sort:
                type: array
                items:
                  type: string
          example:
            size: 50
            sort: "createdAt,desc"
      responses:
        "200":
          description: Message 목록 조회 성공
          content:
            '*/*':
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items: { }
                  nextCursor: { }
                  size:
                    type: integer
                    format: int32
                  hasNext:
                    type: boolean
                  totalElements:
                    type: integer
                    format: int64
    post:
      tags:
        - Message
      summary: Message 생성
      operationId: create_2
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                messageCreateRequest:
                  type: object
                  description: Message 생성 정보
                  properties:
                    content:
                      type: string
                    channelId:
                      type: string
                      format: uuid
                    authorId:
                      type: string
                      format: uuid
                  required:
                    - authorId
                    - channelId
                attachments:
                  type: array
                  description: Message 첨부 파일들
                  items:
                    type: string
                    format: binary
              required:
                - messageCreateRequest
      responses:
        "201":
          description: Message가 성공적으로 생성됨
          content:
            '*/*':
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
                  content:
                    type: string
                  channelId:
                    type: string
                    format: uuid
                  author:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      username:
                        type: string
                      email:
                        type: string
                      profile:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          fileName:
                            type: string
                          size:
                            type: integer
                            format: int64
                          contentType:
                            type: string
                          status:
                            type: string
                            enum:
                              - PROCESSING
                              - SUCCESS
                              - FAIL
                      online:
                        type: boolean
                      role:
                        type: string
                        enum:
                          - ADMIN
                          - USER
                          - CHANNEL_MANAGER
                  attachments:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        fileName:
                          type: string
                        size:
                          type: integer
                          format: int64
                        contentType:
                          type: string
                        status:
                          type: string
                          enum:
                            - PROCESSING
                            - SUCCESS
                            - FAIL
        "404":
          description: Channel 또는 User를 찾을 수 없음
          content:
            '*/*':
              example: "Channel | Author with id {channelId | author} not found"
  /api/channels/public:
    post:
      tags:
        - Channel
      summary: Public Channel 생성
      operationId: create_3
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Public Channel 생성 정보
              properties:
                name:
                  type: string
                  maxLength: 100
                  minLength: 0
                description:
                  type: string
                  maxLength: 500
                  minLength: 0
              required:
                - name
        required: true
      responses:
        "201":
          description: Public Channel이 성공적으로 생성됨
          content:
            '*/*':
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  type:
                    type: string
                    enum:
                      - PUBLIC
                      - PRIVATE
                  name:
                    type: string
                  description:
                    type: string
                  participants:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        username:
                          type: string
                        email:
                          type: string
                        profile:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            fileName:
                              type: string
                            size:
                              type: integer
                              format: int64
                            contentType:
                              type: string
                            status:
                              type: string
                              enum:
                                - PROCESSING
                                - SUCCESS
                                - FAIL
                        online:
                          type: boolean
                        role:
                          type: string
                          enum:
                            - ADMIN
                            - USER
                            - CHANNEL_MANAGER
                  lastMessageAt:
                    type: string
                    format: date-time
  /api/channels/private:
    post:
      tags:
        - Channel
      summary: Private Channel 생성
      operationId: create_4
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Private Channel 생성 정보
              properties:
                participantIds:
                  type: array
                  items:
                    type: string
                    format: uuid
                  minItems: 1
              required:
                - participantIds
        required: true
      responses:
        "201":
          description: Private Channel이 성공적으로 생성됨
          content:
            '*/*':
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  type:
                    type: string
                    enum:
                      - PUBLIC
                      - PRIVATE
                  name:
                    type: string
                  description:
                    type: string
                  participants:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        username:
                          type: string
                        email:
                          type: string
                        profile:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            fileName:
                              type: string
                            size:
                              type: integer
                              format: int64
                            contentType:
                              type: string
                            status:
                              type: string
                              enum:
                                - PROCESSING
                                - SUCCESS
                                - FAIL
                        online:
                          type: boolean
                        role:
                          type: string
                          enum:
                            - ADMIN
                            - USER
                            - CHANNEL_MANAGER
                  lastMessageAt:
                    type: string
                    format: date-time
  /api/auth/refresh:
    post:
      tags:
        - Auth
      summary: 토큰 리프레시
      operationId: refreshToken
      parameters:
        - name: REFRESH_TOKEN
          in: cookie
          required: true
          schema:
            type: string
      responses:
        "200":
          description: 토큰 리프레시 성공
          content:
            '*/*':
              schema:
                type: object
                properties:
                  userDto:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      username:
                        type: string
                      email:
                        type: string
                      profile:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          fileName:
                            type: string
                          size:
                            type: integer
                            format: int64
                          contentType:
                            type: string
                          status:
                            type: string
                            enum:
                              - PROCESSING
                              - SUCCESS
                              - FAIL
                      online:
                        type: boolean
                      role:
                        type: string
                        enum:
                          - ADMIN
                          - USER
                          - CHANNEL_MANAGER
                  accessToken:
                    type: string
        "401":
          description: 유효하지 않은 토큰
  /api/users/{userId}:
    delete:
      tags:
        - User
      summary: User 삭제
      operationId: delete
      parameters:
        - name: userId
          in: path
          description: 삭제할 User ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: User가 성공적으로 삭제됨
        "404":
          description: User를 찾을 수 없음
          content:
            '*/*':
              example: "User with id {id} not found"
    patch:
      tags:
        - User
      summary: User 정보 수정
      operationId: update
      parameters:
        - name: userId
          in: path
          description: 수정할 User ID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                userUpdateRequest:
                  type: object
                  description: 수정할 User 정보
                  properties:
                    newUsername:
                      type: string
                      maxLength: 50
                      minLength: 4
                    newEmail:
                      type: string
                      maxLength: 100
                      minLength: 0
                    newPassword:
                      type: string
                      maxLength: 20
                      minLength: 8
                profile:
                  type: string
                  format: binary
                  description: 수정할 User 프로필 이미지
              required:
                - userUpdateRequest
      responses:
        "200":
          description: User 정보가 성공적으로 수정됨
          content:
            '*/*':
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  username:
                    type: string
                  email:
                    type: string
                  profile:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      fileName:
                        type: string
                      size:
                        type: integer
                        format: int64
                      contentType:
                        type: string
                      status:
                        type: string
                        enum:
                          - PROCESSING
                          - SUCCESS
                          - FAIL
                  online:
                    type: boolean
                  role:
                    type: string
                    enum:
                      - ADMIN
                      - USER
                      - CHANNEL_MANAGER
        "400":
          description: 같은 email 또는 username를 사용하는 User가 이미 존재함
          content:
            '*/*':
              example: "user with email {newEmail} already exists"
        "404":
          description: User를 찾을 수 없음
          content:
            '*/*':
              example: "User with id {userId} not found"
  /api/readStatuses/{readStatusId}:
    patch:
      tags:
        - ReadStatus
      summary: Message 읽음 상태 수정
      operationId: update_1
      parameters:
        - name: readStatusId
          in: path
          description: 수정할 읽음 상태 ID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: 수정할 읽음 상태 정보
              properties:
                newLastReadAt:
                  type: string
                  format: date-time
                newNotificationEnabled:
                  type: boolean
        required: true
      responses:
        "200":
          description: Message 읽음 상태가 성공적으로 수정됨
          content:
            '*/*':
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  userId:
                    type: string
                    format: uuid
                  channelId:
                    type: string
                    format: uuid
                  lastReadAt:
                    type: string
                    format: date-time
                  notificationEnabled:
                    type: boolean
        "404":
          description: Message 읽음 상태를 찾을 수 없음
          content:
            '*/*':
              example: "ReadStatus with id {readStatusId} not found"
  /api/messages/{messageId}:
    delete:
      tags:
        - Message
      summary: Message 삭제
      operationId: delete_1
      parameters:
        - name: messageId
          in: path
          description: 삭제할 Message ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Message가 성공적으로 삭제됨
        "404":
          description: Message를 찾을 수 없음
          content:
            '*/*':
              example: "Message with id {messageId} not found"
    patch:
      tags:
        - Message
      summary: Message 내용 수정
      operationId: update_2
      parameters:
        - name: messageId
          in: path
          description: 수정할 Message ID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: 수정할 Message 내용
              properties:
                newContent:
                  type: string
        required: true
      responses:
        "200":
          description: Message가 성공적으로 수정됨
          content:
            '*/*':
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
                  content:
                    type: string
                  channelId:
                    type: string
                    format: uuid
                  author:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      username:
                        type: string
                      email:
                        type: string
                      profile:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          fileName:
                            type: string
                          size:
                            type: integer
                            format: int64
                          contentType:
                            type: string
                          status:
                            type: string
                            enum:
                              - PROCESSING
                              - SUCCESS
                              - FAIL
                      online:
                        type: boolean
                      role:
                        type: string
                        enum:
                          - ADMIN
                          - USER
                          - CHANNEL_MANAGER
                  attachments:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        fileName:
                          type: string
                        size:
                          type: integer
                          format: int64
                        contentType:
                          type: string
                        status:
                          type: string
                          enum:
                            - PROCESSING
                            - SUCCESS
                            - FAIL
        "404":
          description: Message를 찾을 수 없음
          content:
            '*/*':
              example: "Message with id {messageId} not found"
  /api/channels/{channelId}:
    delete:
      tags:
        - Channel
      summary: Channel 삭제
      operationId: delete_2
      parameters:
        - name: channelId
          in: path
          description: 삭제할 Channel ID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Channel이 성공적으로 삭제됨
        "404":
          description: Channel을 찾을 수 없음
          content:
            '*/*':
              example: "Channel with id {channelId} not found"
    patch:
      tags:
        - Channel
      summary: Channel 정보 수정
      operationId: update_3
      parameters:
        - name: channelId
          in: path
          description: 수정할 Channel ID
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: 수정할 Channel 정보
              properties:
                newName:
                  type: string
                  maxLength: 100
                  minLength: 0
                newDescription:
                  type: string
                  maxLength: 500
                  minLength: 0
        required: true
      responses:
        "200":
          description: Channel 정보가 성공적으로 수정됨
          content:
            '*/*':
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  type:
                    type: string
                    enum:
                      - PUBLIC
                      - PRIVATE
                  name:
                    type: string
                  description:
                    type: string
                  participants:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        username:
                          type: string
                        email:
                          type: string
                        profile:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            fileName:
                              type: string
                            size:
                              type: integer
                              format: int64
                            contentType:
                              type: string
                            status:
                              type: string
                              enum:
                                - PROCESSING
                                - SUCCESS
                                - FAIL
                        online:
                          type: boolean
                        role:
                          type: string
                          enum:
                            - ADMIN
                            - USER
