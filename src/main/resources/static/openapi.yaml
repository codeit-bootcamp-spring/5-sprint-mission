            type: string
            format: uuid
          minItems: 1
      required:
        - participantIds
    JwtDto:
      type: object
      properties:
        userDto:
          type: object
          properties:
            id:
              type: string
              format: uuid
            username:
              type: string
            email:
              type: string
            profile:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                fileName:
                  type: string
                size:
                  type: integer
                  format: int64
                contentType:
                  type: string
                status:
                  type: string
                  enum:
                    - PROCESSING
                    - SUCCESS
                    - FAIL
            online:
              type: boolean
            role:
              type: string
              enum:
                - ADMIN
                - USER
                - CHANNEL_MANAGER
