spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update       # 개발에선 편하게
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      platform: postgresql   # ⬅️ data-postgresql.sql만 실행

logging:
  level:
    root: info
    # 웹 요청 로그
    org.springframework.web: debug
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

    # 직접 작성한 코드
    com.sprint.mission.discodeit: debug

    #SQL 로그
    org.hibernate.sql: debug # 실행된 SQL
    org.hibernate.orm.jdbc.bind: trace # 바인딩 파라미터

