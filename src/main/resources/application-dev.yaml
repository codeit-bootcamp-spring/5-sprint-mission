spring:
  application:
    name: discodeit
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update       # 개발에선 편하게
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      platform: postgresql   # ⬅️ data-postgresql.sql만 실행
      schema-locations: classpath:schema.sql
      data-locations: classpath:data-postgresql.sql

logging:
  level:
    root: info
    # 웹 요청 로그
    org.springframework.web: debug
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

    # 직접 작성한 코드
    com.sprint.mission.discodeit: debug

    #SQL 로그
    org.hibernate.sql: debug # 실행된 SQL

    com.codeit.session: DEBUG
    org.springframework.security: TRACE
    org.springframework.security.web.csrf: DEBUG

