spring:
  config.activate.on-profile: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://discodeit-db:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
  jpa.hibernate.ddl-auto: update
server.port: 8081
logging.level:
  com.sprint.mission.discodeit: debug
  org.hibernate.SQL: debug
  org.hibernate.orm.jdbc.bind: trace

discodeit:
  s3:
    access-key: ${AWS_S3_ACCESS_KEY_DEV}
    secret-key: ${AWS_S3_SECRET_KEY_DEV}
    region: ${AWS_S3_REGION_DEV:ap-northeast-2}
    bucket: ${AWS_S3_BUCKET_DEV:discodeit-dev-bucket}
    presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION_DEV:60}