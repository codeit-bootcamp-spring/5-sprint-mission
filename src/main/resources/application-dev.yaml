spring:
  jmx:
    enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit # 로컬에서 Postgrel 돌림
    driver-class-name: org.postgresql.Driver
    username: findex_user
    password: 1234

  jpa:
    hibernate:
      ddl-auto: none  # 이미 DB에 테이블이 있으니까 자동 생성 안 함
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true

logging:
  level:
    root: info
    org.hibernate.type: trace
    org.hibernate.SQL: debug

server:
  port: 8080
