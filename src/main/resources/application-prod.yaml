spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate

server:
  error:
    include-stacktrace: never
    include-message: never
    include-exception: false

logging:
  level:
    root: WARN
    com.sprint.mission: INFO
    net.ttddyy.dsproxy.listener: OFF

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

discodeit:
  storage:
    type: S3
  api:
    server-url: https://discodeit.com
