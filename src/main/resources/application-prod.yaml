server:
  port: 8080

logging:
  level:
    root: info
    com.sprint.mission.discodeit: info # 운영에서는 info
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://postgres:5432/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    #        default_batch_fetch_size: 100
    open-in-view: false

