spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}

server:
  error:
    include-stacktrace: never
    include-message: never
    include-exception: false

logging:
  level:
    root: WARN
    com.sprint.mission: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

discodeit:
  storage:
    type: LOCAL
    local:
      root-path: /var/app/storage
      orphan-grace: 1h
  api:
    server-url: ${API_SERVER_URL:https://discodeit.com}
