server:
  port: 8081
  address: 0.0.0.0

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate

  boot:
    admin:
      client:
        url: ${SPRING_BOOT_ADMIN_CLIENT_URL}

logging:
  level:
    root: info
    com.discodeit: info

info:
  storage:
    path: ${FILE_UPLOAD_DIR}

file:
  upload-dir: ${FILE_UPLOAD_DIR}