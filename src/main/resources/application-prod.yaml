spring:
  datasource:
    url: jdbc:postgresql://host.docker.internal:5432/discodeit
    username: ${DB_USERNAME:discodeit_user}
    password: ${DB_PASSWORD:discodeit1234}

server:
  error:
    include-stacktrace: never
    include-message: never
    include-exception: false

logging:
  level:
    root: WARN
    com.sprint.mission: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,prometheus
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: false

discodeit:
  storage:
    type: LOCAL
    local:
      root-path: /var/app/.storage
      orphan-grace: 1h
  api:
    server-url: http://localhost:8081
