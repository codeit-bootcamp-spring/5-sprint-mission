spring:
  application:
    name: discodeit

  servlet:
    multipart:
      maxFileSize: 10MB     # 파일 하나의 최대 크기
      maxRequestSize: 30MB  # 한 번에 최대 업로드 가능 용량

  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    # driver-class-name: org.postgresql.Driver  # (생략 가능, 자동 감지됨)

  jpa:
    hibernate:
      ddl-auto: none      # 개발 중엔 update, 운영에선 validate 권장
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # dialect: org.hibernate.dialect.PostgreSQLDialect  # (보통 자동 설정)
  sql:
    init:
      mode: always

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql: trace

discodeit:
  repository:
    type: file              # jcf | file
    file-directory: .discodeit
  storage:                  # storage를 활용하기 위한 추가 설정 (위에 지워야될듯?)
    type: local
    local:
      root-path: ./storage