spring:
  profiles:
    active: dev
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    org.springframework: INFO
    com.sprint.mission: DEBUG
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: OFF

app:
  name: Discodeit
  version: 1.0.0
  server:
    port: 8080
    url: http://localhost:8080
    timeout: 5000
  admins:
    - commicat.sup@gmail.com
    - commicat2@gmail.com
  metadata:
    region: korea
    owner: admin-team
  storage:
    type: file
    root-dir: file-data-map
