spring:
  profiles:
    active: dev

server:
  shutdown: graceful
  compression:
    enabled: true

springdoc:
  swagger-ui:
    path: /docs
    urls:
      - name: Auth API
        url: /docs/openapi-auth.yaml
      - name: Binary Contents API
        url: /docs/openapi-binaryContents.yaml
      - name: Channels API
        url: /docs/openapi-channels.yaml
      - name: Messages API
        url: /docs/openapi-messages.yaml
      - name: Read Statuses API
        url: /docs/openapi-readStatuses.yaml
      - name: Users API
        url: /docs/openapi-users.yaml
