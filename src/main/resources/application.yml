spring:
  application:
    name: discodeit

discodeit:
  repository:
    type: file # jcf | file
    file-directory: .discodeit

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    display-request-duration: true
    persist-authorization: true
    tags-sorter: alpha