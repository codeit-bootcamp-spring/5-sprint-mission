spring:
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:file:/home/jeonggiju/test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;IFEXISTS=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  boot:
    admin:
      client:
        url: http://localhost:9090

server:
  port: 8080

logging:
  level:
    # Hibernate SQL
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: debug
    org.hibernate.type.descriptor.sql: debug

    # Spring Web
    org.springframework.web: debug
    org.springframework.web.filter.CommonsRequestLoggingFilter: debug

