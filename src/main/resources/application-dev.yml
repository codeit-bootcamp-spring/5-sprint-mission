spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true  # 실행 쿼리 보기
    open-in-view: false # OSIV 비활성화
    hibernate:
      ddl-auto: validate  # (validate, update, create, create-drop 중 선택)
      naming: # 컬럼 명 매칭 방법
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.PostgreSQLDialect


logging:
  level:
    # Hibernate SQL
    org.hibernate.SQL: off
    org.hibernate.orm.jdbc.bind: trace
    org.hibernate.type.descriptor.sql: trace

    # Spring Web
    org.springframework.web: trace
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
    org.springframework.security: trace
    org.springframework.security.web: trace
    org.springframework.cache: DEBUG
    org.springframework.data.redis.cache: DEBUG

discodeit:
  storage:
    local:
      root-path: ./data.dir
