spring:
  application:
    name: discodeit

  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: none               # 안끄면 내가 만든 Entity를 기준으로 DB에 테이블 자동 생성
    show-sql: false                # (선택) 콘솔에 SQL 출력 원하면 true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: true

springdoc:
  swagger-ui:
    enabled: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type: trace
