spring:
  application:
    name: discodeit
  profiles:
    default: local
  config:
    import: optional:file:.env[.properties]

  # Database
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          batch_size: 20
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 100

  # Caching
  cache:
    type: ${SPRING_CACHE_TYPE:redis}
    redis:
      enable-statistics: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  # Messaging
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:discodeit-group}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.sprint.mission.discodeit.dto

  # File Upload
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

  # JSON Serialization
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

  # Graceful Shutdown
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers,caches
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /docs
    enabled: true
  swagger-ui:
    path: /docs/ui
    enabled: true

discodeit:
  admin:
    enabled: ${DISCODEIT_ADMIN_ENABLED:false}
    username: ${DISCODEIT_ADMIN_USERNAME:}
    email: ${DISCODEIT_ADMIN_EMAIL:}
    password: ${DISCODEIT_ADMIN_PASSWORD:}
  api:
    server-url: ${API_SERVER_URL:}
    version: ${API_VERSION:2.2-M11}
  datasource-proxy:
    enabled: ${DATASOURCE_PROXY_ENABLED:false}
    name: DS-Proxy
    log-level: DEBUG
    slow-query-threshold: 200ms
    slow-query-log-level: WARN
  jwt:
    access-token:
      secret: ${JWT_ACCESS_SECRET:}
      previous-secret: ${JWT_ACCESS_SECRET_PREVIOUS:}
      expiration: ${JWT_ACCESS_EXPIRATION:30m}
    refresh-token:
      secret: ${JWT_REFRESH_SECRET:}
      previous-secret: ${JWT_REFRESH_SECRET_PREVIOUS:}
      expiration: ${JWT_REFRESH_EXPIRATION:7d}
    max-sessions: ${JWT_MAX_SESSIONS:1}
    registry-type: ${JWT_REGISTRY_TYPE:in-memory} # Options: in-memory, redis
  storage:
    type: ${STORAGE_TYPE:local} # Options: local, s3
    local:
      root-path: ${STORAGE_LOCAL_ROOT_PATH:.discodeit/storage}
    orphan-grace: ${STORAGE_ORPHAN_GRACE:1h}
    s3:
      access-key: ${AWS_S3_ACCESS_KEY:}
      secret-key: ${AWS_S3_SECRET_KEY:}
      region: ${AWS_S3_REGION:}
      bucket: ${AWS_S3_BUCKET:}
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:10m}
  rate-limit:
    max-attempts: ${RATE_LIMIT_MAX_ATTEMPTS:5}
    window-duration: ${RATE_LIMIT_WINDOW_SECONDS:1m}
    block-duration: ${RATE_LIMIT_BLOCK_SECONDS:5m}

logging:
  level:
    root: INFO
    org.hibernate.SQL: OFF
    net.ttddyy.dsproxy.listener: OFF

info:
  app:
    name: ${spring.application.name}
    version: ${discodeit.api.version}
  java:
    version: ${java.version}
  build:
    spring-boot: 3.4.5
