spring:
  application:
    name: discodeit
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          batch_size: 20
        order_inserts: true
        order_updates: true
        default_batch_fetch_size: 100
  lifecycle:
    timeout-per-shutdown-phase: 30s
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  profiles:
    default: local
  config:
    import: optional:file:.env[.properties]

server:
  shutdown: graceful
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /docs
    enabled: true
  swagger-ui:
    path: /docs/ui
    enabled: true

discodeit:
  storage:
    type: ${STORAGE_TYPE:local}
    local:
      root-path: ${STORAGE_LOCAL_ROOT_PATH:.discodeit/storage}
    s3:
      access-key: ${AWS_S3_ACCESS_KEY:}
      secret-key: ${AWS_S3_SECRET_KEY:}
      region: ${AWS_S3_REGION:}
      bucket: ${AWS_S3_BUCKET:}
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:600}
    orphan-grace: ${STORAGE_ORPHAN_GRACE:1h}
  api:
    server-url: ${API_SERVER_URL:}
    version: ${API_VERSION:2.1-M10}
  datasource-proxy:
    name: DS-Proxy
    log-level: DEBUG
    slow-query-threshold: 200ms
    slow-query-log-level: WARN
  admin:
    enabled: ${DISCODEIT_ADMIN_ENABLED:false}
    username: ${DISCODEIT_ADMIN_USERNAME:}
    email: ${DISCODEIT_ADMIN_EMAIL:}
    password: ${DISCODEIT_ADMIN_PASSWORD:}
  jwt:
    access-token:
      secret: ${JWT_ACCESS_SECRET:}
      previous-secret: ${JWT_ACCESS_SECRET_PREVIOUS:} # For graceful secret rotation
      expiration-ms: ${JWT_ACCESS_EXPIRATION:1800000} # 30 minutes
    refresh-token:
      secret: ${JWT_REFRESH_SECRET:}
      previous-secret: ${JWT_REFRESH_SECRET_PREVIOUS:} # For graceful secret rotation
      expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days
    max-sessions: ${JWT_MAX_SESSIONS:1} # Maximum concurrent sessions per user
  rate-limit:
    max-attempts: ${RATE_LIMIT_MAX_ATTEMPTS:5}
    window-seconds: ${RATE_LIMIT_WINDOW_SECONDS:60}
    block-seconds: ${RATE_LIMIT_BLOCK_SECONDS:300}

logging:
  level:
    root: INFO
    org.hibernate.SQL: OFF
    net.ttddyy.dsproxy.listener: WARN

info:
  name: Discodeit
  version: ${discodeit.api.version}
  java:
    version: 17
  spring-boot:
    version: 3.4.5
  config:
    datasource:
      url: ${spring.datasource.url}
      driver-class-name: ${spring.datasource.driver-class-name}
    jpa:
      ddl-auto: ${spring.jpa.hibernate.ddl-auto}
    storage:
      type: ${discodeit.storage.type}
      path: ${discodeit.storage.local.root-path}
    multipart:
      max-file-size: ${spring.servlet.multipart.max-file-size}
      max-request-size: ${spring.servlet.multipart.max-request-size}
