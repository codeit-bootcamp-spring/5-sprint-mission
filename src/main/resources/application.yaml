spring:
  application:
    name: discodeit
  servlet:
    multipart:
      maxFileSize: 100MB # 파일 하나의 최대 크기
      maxRequestSize: 300MB  # 한 번에 최대 업로드 가능 용량
  #DB 접속 정보
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: validate
      # 테이블 자동 생성/업데이트 옵션
      # create, create-drop, update, validate, none
    show-sql: true      # 실행되는 SQL 콘솔 출력 여부
    properties:
      hibernate:
        #        default_batch_fetch_size: 100
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        jdbc.time_zone: UTC
        open-in-view: false

# log
logging:
  level:
    # Hibernate SQL
    org.hibernate.SQL: debug     # 실행되는 SQL 출력
    org.hibernate.orm.jdbc.bind: trace   # 바인딩된 파라미터 값 출력
    org.hibernate.type.descriptor.sql: trace   #(추가) 컬럼 값 변환 로깅

    # Spring Web
    org.springframework.web: trace
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"


discodeit:
  storage:
    type: local
    local:
      root-path: .discodeit/storage



