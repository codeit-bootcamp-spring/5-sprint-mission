spring:
  application:
    name: discodeit
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    root: info

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: when_authorized

discodeit:
  storage:
    type: ${discodeit.storage.type:local}
    local:
      root-path: ${discodeit.storage.local.root-path:/tmp/discodeit}

info:
  app:
    name: Discodeit
    version: 1.7.0
  java:
    version: 17
  spring-boot:
    version: 3.4.0
  datasource:
    url: ${spring.datasource.url:jdbc:postgresql://discodeit-db:5432/postgres}
    driver: ${spring.datasource.driver-class-name:org.postgresql.Driver}
  jpa:
    ddl-auto: ${spring.jpa.hibernate.ddl-auto}
  storage:
    type: ${discodeit.storage.type}
    path: ${discodeit.storage.local.root-path}
  multipart:
    max-file-size: ${spring.servlet.multipart.max-file-size}
    max-request-size: ${spring.servlet.multipart.max-request-size}
  s3:
    region: ${discodeit.s3.region}
    bucket: ${discodeit.s3.bucket}