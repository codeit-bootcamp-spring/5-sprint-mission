spring:
  profiles:
    active: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC

logging:
  level:
    org.springframework.orm.jpa.persistenceunit.SpringPersistenceUnitInfo: OFF
    org.hibernate.orm.connections.pooling: OFF

server:
  shutdown: graceful

springdoc:
  api-docs:
    path: /docs
  swagger-ui:
    path: /docs/ui
    display-request-duration: true

discodeit:
  storage:
    type: LOCAL
    local:
      root-path: ./storage
      orphan-grace: 10m
