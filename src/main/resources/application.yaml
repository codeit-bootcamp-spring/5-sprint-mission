spring:
  profiles:
    active: dev
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC

server:
  shutdown: graceful

logging:
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"

springdoc:
  api-docs:
    path: /docs
  swagger-ui:
    path: /docs/ui
    display-request-duration: true

discodeit:
  storage:
    type: LOCAL
    local:
      root-path: ./storage
      orphan-grace: 10m
