spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: DiscodeitHikariPool
      minimum-idle: 5
      maximum-pool-size: 10
      auto-commit: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        default_batch_fetch_size: 50
        jdbc.time_zone: UTC
        connection.provider_disables_autocommit: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 40MB

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    com.zaxxer.hikari: info

discodeit:
  storage:
    type: local
    local:
      root-path: ${DISCODEIT_STORAGE_ROOT:.discodeit/storage}
