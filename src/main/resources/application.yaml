spring:
  application:
    name: discodeit
  config:
    import: optional:file:.env[.properties]
  profiles:
    default: local
  output:
    ansi:
      enabled: always
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_batch_fetch_size: 100
  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  shutdown: graceful
  compression:
    enabled: true

logging:
  level:
    org.hibernate.SQL: OFF
    net.ttddyy.dsproxy.listener: OFF

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /docs
    enabled: true
  swagger-ui:
    path: /docs/ui
    enabled: true

info:
  app:
    name: Discodeit
    version: 1.7.0
    java-version: 17
    spring-boot-version: 3.4.0
  datasource:
    url: ${spring.datasource.url:N/A}
    driver-class-name: org.postgresql.Driver
  jpa:
    ddl-auto: ${spring.jpa.hibernate.ddl-auto}
  storage:
    type: ${discodeit.storage.type:N/A}
    path: ${discodeit.storage.local.root-path:N/A}
  multipart:
    max-file-size: ${spring.servlet.multipart.max-file-size}
    max-request-size: ${spring.servlet.multipart.max-request-size}
