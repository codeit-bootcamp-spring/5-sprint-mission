spring:
  application:
    name: discodeit
  profiles:
    active: prod # dev, prod 선택 가능
  servlet:
    multipart:
      maxFileSize: 10MB # 파일 하나의 최대 크기
      maxRequestSize: 30MB  # 한 번에 최대 업로드 가능 용량

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
      # create, create-drop, update, validate, none
    show-sql: true
    properties:
      hibernate:
        #        default_batch_fetch_size: 100
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        jdbc.time_zone: UTC
        open-in-view: false

# swagger
springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    display-request-duration: true
    persist-authorization: true


# log
logging:
  level:
    root: info

  pattern:
    console: "%d{HH:mm:ss} %-5level %logger{36} - %msg%n"

# actuator/info 에 노출할 정보
info:
  app:
    name: ${spring.application.name}
    description: Discode service (Actuator info)
    version: ${spring.application.version:1.7.0}
  java:
    version: 17
  spring:
    boot:
      version: 3.4.0
  datasource:
    url: ${spring.datasource.url:jdbc:postgresql://localhost:5432/discodeit}
    driver-class-name: ${spring.datasource.driver-class-name:org.postgresql.Driver}
  jpa:
    ddl-auto: ${spring.jpa.hibernate.ddl-auto:validate}
  storage:
    type: ${discodeit.storage.type:local}
    path: ${discodeit.storage.local.root-path:.discodeit/storage}
  multipart:
    max-file-size: ${spring.servlet.multipart.maxFileSize:10MB}
    max-request-size: ${spring.servlet.multipart.maxRequestSize:30MB}
  runtime:
    profile: ${spring.profiles.active}
    java: ${java.runtime.version}
    jvmVendor: ${java.vendor}

# Actuator 노출 범위
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true   # liveness/readiness
  info:
    env:
      enabled: true     # info.* 노출
    java:
      enabled: true
    os:
      enabled: true
    build:
      enabled: true

discodeit:
  storage:
    type: local
    local:
      root-path: .discodeit/storage