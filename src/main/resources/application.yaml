spring:
  profiles:
    active: dev
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC

server:
  shutdown: graceful

springdoc:
  api-docs:
    path: /docs
  swagger-ui:
    path: /docs/ui
    display-request-duration: true

discodeit:
  storage:
    type: LOCAL
    local:
      root-path: ./storage
      orphan-grace: 10m
  api:
    server-url: http://localhost:8081
