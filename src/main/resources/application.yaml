spring:
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        jdbc.lob.non_contextual_creation: true
        jdbc.time_zone: UTC

server:
  shutdown: graceful
  forward-headers-strategy: native

springdoc:
  swagger-ui:
    path: /docs
    urls:
      - name: Auth API
        url: /docs/openapi-auth.yaml
      - name: Binary Contents API
        url: /docs/openapi-binaryContents.yaml
      - name: Channels API
        url: /docs/openapi-channels.yaml
      - name: Messages API
        url: /docs/openapi-messages.yaml
      - name: Read Statuses API
        url: /docs/openapi-readStatuses.yaml
      - name: Users API
        url: /docs/openapi-users.yaml
