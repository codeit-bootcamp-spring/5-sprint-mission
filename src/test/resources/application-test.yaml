# Uses H2 in-memory database (no external dependencies)

spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  config:
    activate:
      on-profile: "test"
    import: optional:file:.env.test[.properties]

  # Database (H2 in PostgreSQL compatibility mode)
  datasource:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
  sql:
    init:
      mode: never
  cache:
    type: redis

logging:
  level:
    com.sprint.mission: DEBUG
    net.ttddyy.dsproxy.listener: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
