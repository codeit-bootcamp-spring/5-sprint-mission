spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        type:
          preferred_instant_jdbc_type: TIMESTAMP
        jdbc:
          time_zone: UTC
        format_sql: true

  sql:
    init:
      mode: never

logging:
  level:
    root: info
    com.sprint.mission.discodeit: debug
    org.hibernate.sql: debug
    org.hibernate.orm.jdbc.bind: trace
    org.hibernate.orm.boot: warn
    org.hibernate.tool.schema: warn
    org.hibernate.tool.hbm2ddl: warn