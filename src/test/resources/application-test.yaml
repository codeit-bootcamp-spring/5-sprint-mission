spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
  datasource:
    url: jdbc:h2:mem:discodeit-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
  sql:
    init:
      mode: never
  cache:
    type: caffeine

logging:
  level:
    com.sprint.mission: DEBUG
    net.ttddyy.dsproxy.listener: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

discodeit:
  storage:
    type: local
    local:
      root-path: ./build/.discodeit/storage
    s3:
      access-key: test-access-key
      secret-key: test-secret-key
      region: us-east-1
      bucket: test-bucket
      presigned-url-expiration: 5m
    orphan-grace: 2s
  datasource-proxy:
    name: DS-Proxy-Test
  admin:
    enabled: true
  jwt:
    access-token:
      secret: test-access-secret-key-must-be-at-least-32-characters
      expiration-ms: 900000
    refresh-token:
      secret: test-refresh-secret-key-must-be-at-least-32-characters
      expiration-ms: 604800000
    max-sessions: 5
  rate-limit:
    max-attempts: 5
    window-seconds: 60
    block-seconds: 300
