plugins {
    id 'java'
    id 'org.springframework.boot' version '3.4.5'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'jacoco'
    id 'checkstyle'
    id 'com.github.ben-manes.versions' version '0.51.0'
}

group = 'com.sprint.mission'
version = '1.2-M8'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

configurations {
    compileOnly {
        extendsFrom annotationProcessor
    }
    testCompileOnly {
        extendsFrom testAnnotationProcessor
    }
}

repositories {
    mavenCentral()
}

ext {
    postgresqlVersion = '42.7.7'
    springSecurityVersion = '6.4.4'
    logbackVersion = '1.5.19'
    commonsLang3Version = '3.18.0'
    mapstructVersion = '1.6.3'
    springdocVersion = '2.8.11'
    datasourceProxyVersion = '1.10'
}

dependencies {
    // Spring Boot Starters
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // Development Tools
    developmentOnly 'org.springframework.boot:spring-boot-devtools'
    compileOnly 'org.springframework.boot:spring-boot-configuration-processor'
    annotationProcessor 'org.springframework.boot:spring-boot-configuration-processor'

    // Database Drivers
    runtimeOnly "org.postgresql:postgresql:${postgresqlVersion}"
    testRuntimeOnly 'com.h2database:h2'

    // Testing
    testImplementation 'org.springframework.boot:spring-boot-starter-test'

    // Security
    implementation "org.springframework.security:spring-security-crypto:${springSecurityVersion}"

    // API Documentation
    implementation "org.springdoc:springdoc-openapi-starter-webmvc-ui:${springdocVersion}"

    // Lombok
    compileOnly 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok'
    annotationProcessor 'org.projectlombok:lombok-mapstruct-binding:0.2.0'
    testCompileOnly 'org.projectlombok:lombok'
    testAnnotationProcessor 'org.projectlombok:lombok'

    // MapStruct
    implementation "org.mapstruct:mapstruct:${mapstructVersion}"
    annotationProcessor "org.mapstruct:mapstruct-processor:${mapstructVersion}"
    testAnnotationProcessor "org.mapstruct:mapstruct-processor:${mapstructVersion}"

    // Database Utilities
    implementation "net.ttddyy:datasource-proxy:${datasourceProxyVersion}"
}

dependencyManagement {
    imports {
        mavenBom 'org.springframework.boot:spring-boot-dependencies:3.4.5'
    }
    dependencies {
        dependency 'org.springframework:spring-core:6.2.11'
        dependency 'org.springframework:spring-web:6.2.10'
        dependency 'org.springframework:spring-webmvc:6.2.10'
        dependency 'org.springframework:spring-context:6.2.7'

        dependency "ch.qos.logback:logback-core:${logbackVersion}"
        dependency "ch.qos.logback:logback-classic:${logbackVersion}"

        dependency "org.apache.commons:commons-lang3:${commonsLang3Version}"
    }
}

// Build Configuration
tasks.named('jar') {
    enabled = false
}

tasks.named('bootJar') {
    archiveFileName = "${project.name}-${version}.jar"
}

// Test Configuration
tasks.named('test') {
    useJUnitPlatform()

    // Parallel test execution
    maxParallelForks = Runtime.runtime.availableProcessors().intdiv(2) ?: 1

    testLogging {
        events = ['passed', 'skipped', 'failed']
        exceptionFormat = 'full'
        showStandardStreams = false
    }

    finalizedBy jacocoTestReport
}

// JaCoCo Coverage Configuration
jacoco {
    toolVersion = '0.8.14'
}

def jacocoExclusions = [
        '**/config/**',
        '**/dto/**',
        '**/entity/**',
        '**/exception/**',
        '**/mapper/**',
        '**/*MapperImpl.class',
        '**/util/**',
        '**/*Application.class'
]

tasks.named('jacocoTestReport') {
    dependsOn test

    reports {
        xml.required = true
        html.required = true
    }

    classDirectories.setFrom(
            files(classDirectories.files.collect {
                fileTree(dir: it, exclude: jacocoExclusions)
            })
    )
}

tasks.named('jacocoTestCoverageVerification') {
    dependsOn jacocoTestReport

    violationRules {
        rule {
            element = 'CLASS'
            limit {
                counter = 'LINE'
                value = 'COVEREDRATIO'
                minimum = 0.60
            }
        }
    }

    classDirectories.setFrom(
            files(classDirectories.files.collect {
                fileTree(dir: it, exclude: jacocoExclusions)
            })
    )
}

tasks.named('check') {
    dependsOn jacocoTestCoverageVerification
}

// Checkstyle Configuration
checkstyle {
    toolVersion = '10.17.0'
    configFile = file('config/checkstyle/checkstyle.xml')
    configProperties = [
            'suppressionFile': file('config/checkstyle/checkstyle-suppressions.xml')
    ]
    maxWarnings = 0
    ignoreFailures = false
}

tasks.withType(Checkstyle).configureEach {
    reports {
        xml.required = true
        html.required = true
    }
}

// Dependency Updates Configuration
tasks.named('dependencyUpdates').configure {
    checkForGradleUpdate = true
    outputFormatter = 'json'
    outputDir = 'build/dependencyUpdates'
    reportfileName = 'report'

    rejectVersionIf {
        def isNonStable = { String version ->
            def stableKeyword = ['RELEASE', 'FINAL', 'GA'].any {
                it.toLowerCase() in version.toLowerCase()
            }
            def regex = /^[0-9,.v-]+(-r)?$/
            return !stableKeyword && !(version ==~ regex)
        }
        isNonStable(candidate.version) && !isNonStable(currentVersion)
    }
}
