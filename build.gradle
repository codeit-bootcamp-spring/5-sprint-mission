plugins {
    id 'java'
}

compileJava {
    exclude 'excluded/**'
}

compileTestJava {
    exclude 'excluded/**'
}

group = 'com.sprint.mission'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}


dependencies {
    testImplementation 'org.assertj:assertj-core:3.27.0'

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}