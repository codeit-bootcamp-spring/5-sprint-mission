server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
  jpa:
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.sprint.mission.discodeit: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.security: trace

management:
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

security:
  jwt:
    issuer: discodeit
    secret: your-jwt-secret-key-here-12345628219012345  # 32char 이상 길게 써줘야함!!
    access-token-validity-seconds: 60 # 60초
    refresh-token-validity-seconds: 86400 # 1일