name: 배포

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  build-and-push:
    environment: prod
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4
      - name: AWS CLI 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_S3_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_S3_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_S3_REGION }}

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 및 푸시
        run: |
          ECR_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}

          docker buildx build \
            -t $ECR_URI:${{ github.sha }} \
            -t $ECR_URI:latest \
            --push \
            .

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4
      - name: AWS CLI 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_S3_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_S3_SECRET_KEY }}
          aws-region: ${{ secrets.AWS_S3_REGION }}

      - name: ECS 태스크 정의 업데이트
        run: |
          ECR_URI=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}

          TASK_DEFINITION=$(
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEFINITION }}
          )

          NEW_TASK_DEFINITION=$(
          echo $TASK_DEFINITION | jq \
            --arg IMAGE "$ECR_URI:latest" \
            '.taskDefinition | .containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)'
          )

          NEW_TASK_DEF_ARN=$(
            aws ecs register-task-definition \
              --cli-input-json "$NEW_TASK_DEFINITION" | \
            jq -r '.taskDefinition.taskDefinitionArn'
          )

          echo "NEW_TASK_DEF_ARN=$NEW_TASK_DEF_ARN" >> $GITHUB_ENV

      #      - name: ECS 서비스 중지(프리티어 환경 고려)
      #        run: |
      #          aws ecs update-service \
      #            --cluster ${{ secrets.ECS_CLUSTER }} \
      #            --service ${{ secrets.ECS_SERVICE }} \
      #            --desired-count 0
      #
      #      - name: ECS 서비스 업데이트
      #        run: |
      #          aws ecs update-service \
      #            --cluster ${{ secrets.ECS_CLUSTER }} \
      #            --service ${{ secrets.ECS_SERVICE }} \
      #            --task-definition $NEW_TASK_DEF_ARN \
      #            --desired-count 1 \
      #            --force-new-deployment
      - name: ECS 서비스 업데이트 (새 태스크 강제 배포)
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --task-definition $NEW_TASK_DEF_ARN \
            --desired-count 1 \
            --force-new-deployment