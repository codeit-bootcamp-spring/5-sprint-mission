# ================================
# Secrets (Environment secrets)
# AWS_ACCESS_KEY     : IAM 사용자의 Access Key ID
# AWS_SECRET_KEY     : IAM 사용자의 Secret Access Key
#
# Vars (Environment variables)
# AWS_REGION         : ECS 배포 리전 (ap-northeast-2)
# ECR_REPOSITORY_URI : Public ECR URI (public.ecr.aws/y3p3g7l1/discodeit)
# ECS_CLUSTER        : discodeit-cluster
# ECS_SERVICE        : discodeit-service
# ECS_TASK_DEFINITION: discodeit-task
# ================================
name: CD - Deploy

on:
  push:
    branches:
      - release
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: AWS CLI 설정 (Public ECR - us-east-1)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: Public ECR 로그인
        run: |
          aws ecr-public get-login-password --region us-east-1 | \
          docker login --username AWS --password-stdin public.ecr.aws

      - name: Docker 이미지 빌드 및 푸시
        run: |
          docker build \
            -t ${{ vars.ECR_REPOSITORY_URI }}:${{ github.sha }} \
            -t ${{ vars.ECR_REPOSITORY_URI }}:latest \
            .
          
          docker push ${{ vars.ECR_REPOSITORY_URI }}:${{ github.sha }}
          docker push ${{ vars.ECR_REPOSITORY_URI }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: AWS CLI 설정 (ECS - ap-northeast-2)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: ECS 서비스 중지 (프리티어 환경 고려)
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_SERVICE }} \
            --desired-count 0

      - name: ECS 태스크 정의 업데이트
        run: |
          TASK_DEFINITION=$(
            aws ecs describe-task-definition \
              --task-definition ${{ vars.ECS_TASK_DEFINITION }}
          )

          NEW_TASK_DEFINITION=$(
            echo $TASK_DEFINITION | jq \
              --arg IMAGE "${{ vars.ECR_REPOSITORY_URI }}:latest" \
              '.taskDefinition | .containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)'
          )

          NEW_TASK_DEF_ARN=$(
            aws ecs register-task-definition \
              --cli-input-json "$NEW_TASK_DEFINITION" | \
            jq -r '.taskDefinition.taskDefinitionArn'
          )

          echo "NEW_TASK_DEF_ARN=$NEW_TASK_DEF_ARN" >> $GITHUB_ENV

      - name: ECS 서비스 업데이트
        run: |
          aws ecs update-service \
            --cluster ${{ vars.ECS_CLUSTER }} \
            --service ${{ vars.ECS_SERVICE }} \
            --task-definition $NEW_TASK_DEF_ARN \
            --desired-count 1 \
            --force-new-deployment