name: test.yml

on:
  pull_request:
    branches: [ ë°•́£¼í™˜ ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    environment: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x gradlew
      #
      #      - name: Print environment variables (debug)
      #        run: |
      #          echo "SPRING_PROFILES_ACTIVE=$SPRING_PROFILES_ACTIVE"
      #          echo "AWS_S3_BUCKET=$AWS_S3_BUCKET"
      #          echo "AWS_S3_REGION=$AWS_S3_REGION"
      #          echo "AWS_S3_PRESIGNED_URL_EXPIRATION=$AWS_S3_PRESIGNED_URL_EXPIRATION"
      #          echo "STORAGE_TYPE=$STORAGE_TYPE"
      #          echo "AWS_S3_ACCESS_KEY=${AWS_S3_ACCESS_KEY:0:4}****"
      #          echo "AWS_S3_SECRET_KEY=${AWS_S3_SECRET_KEY:0:4}****"

      - name: Run tests
        run: |
          ./gradlew clean test \
            -Dspring.profiles.active=test \
            -Daws.accessKeyId=${{ secrets.AWS_S3_ACCESS_KEY }} \
            -Daws.secretKey=${{ secrets.AWS_S3_SECRET_KEY }} \
            -Daws.region=${{ vars.AWS_S3_REGION }} \
            -Daws.bucket=${{ vars.AWS_S3_BUCKET }} \
            -Daws.presignedUrlExpiration=${{ vars.AWS_S3_PRESIGNED_URL_EXPIRATION }} \
            -Dstorage.type=${{ vars.STORAGE_TYPE }} \
            --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test
          AWS_S3_ACCESS_KEY: ${{ secrets.AWS_S3_ACCESS_KEY }}
          AWS_S3_SECRET_KEY: ${{ secrets.AWS_S3_SECRET_KEY }}
          AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
          AWS_S3_REGION: ${{ vars.AWS_S3_REGION }}
          AWS_S3_PRESIGNED_URL_EXPIRATION: ${{ vars.AWS_S3_PRESIGNED_URL_EXPIRATION }}
          STORAGE_TYPE: ${{ vars.STORAGE_TYPE }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results

      - name: Upload coverage to Codecov
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        run: |
          bash <(curl -s https://codecov.io/bash) -f build/reports/jacoco/test/jacocoTestReport.xml -t $CODECOV_TOKEN || true